# ─────────────────────────────────────────────────────────────────
# CodeQL configuration — explicit pinning to remove the
# "configuration error" banner on the Security tab.
#
# Why this file exists:
#   GitHub's Code Scanning UI compares the configured language list
#   (autodetected when no config is present) against the language
#   the workflow actually uploads. Our autodetection used to include
#   `actions`, `javascript`, `javascript-typescript`, and `typescript`
#   — but our workflow only uploads `javascript-typescript`. The
#   mismatch surfaced as a "Code scanning configuration error" on
#   the repo's Security tab.
#
# What this file pins:
#   - `name`             one canonical config identifier, helps GH
#                        match runs to config
#   - `paths`            scan all src + tests
#   - `paths-ignore`     bypass generated / vendored / declarative
#                        directories that produce false positives
#                        and slow analysis without value
#   - `queries`          `security-and-quality` — strict superset of
#                        `security-extended`: every security query
#                        stays, AND the maintainability/quality
#                        suite (`js/unused-local-variable`,
#                        `js/useless-assignment-to-local`, …) runs
#                        too, populating the "Code quality / Standard
#                        findings" tab. Quality findings get the same
#                        triage rigour as security ones (fix, or
#                        `dismissed_reason` + substantive comment).
#                        Locked structurally by
#                        `tests/guards/codeql-suite-pinning.test.ts`
#                        — a future "shrink the suite to speed CI"
#                        revert fails CI loudly.
# ─────────────────────────────────────────────────────────────────

name: "Inflect Compliance — security-and-quality"

queries:
    - uses: security-and-quality

paths:
    - src
    - tests
    - scripts

paths-ignore:
    # Build artifacts + generated code.
    - "**/node_modules"
    - "**/.next"
    - "**/dist"
    - "**/build"
    - "**/coverage"
    - "**/playwright-report"

    # Prisma client is generated on every install — scanning it
    # produces noisy false-positives from query-builder ergonomics
    # the CodeQL JS suite flags as "untrusted data flows into …".
    - "src/generated"
    - "**/prisma/client"

    # Lockfiles + declarative configs aren't executable code.
    - "**/package-lock.json"
    - "**/*.lock"

    # Test fixtures often carry intentionally-malformed data
    # (sample SARIF payloads, mock JWT secrets, etc.). Scoped to
    # the canonical fixtures dir; real tests under `tests/unit`,
    # `tests/integration`, `tests/rendered`, `tests/guards` still
    # get scanned.
    - "tests/fixtures"
