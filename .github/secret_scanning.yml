# ─────────────────────────────────────────────────────────────────
# Secret scanning configuration
#
# Paths-ignore tells GitHub's secret scanner to skip files whose
# job is to DEFINE or TEST secret-detection logic. Without this,
# every legitimate change to the detector regexes or its tests
# re-fires the scanner against the file's own pattern strings /
# fixtures and surfaces a "leaked key" alert in the Security tab.
#
# What gets excluded + why:
#
#   `.secret-patterns`
#     The canonical regex source for our local pre-commit hook +
#     `tests/guardrails/no-secrets.test.ts` ratchet. Its job is to
#     contain pattern strings like `sk-...T3BlbkFJ...` so the local
#     scanner can match them. Self-matching by the upstream
#     GitHub scanner is structurally inevitable here.
#
#   `tests/unit/security/detect-secrets.test.ts`
#     Asserts the local detector catches each pattern by feeding
#     hand-crafted fake strings (`AIzaSyA0123...`, `sk_live_51...`,
#     etc.) into the run. Every key here is fictitious — none can
#     authenticate against any real provider. The structure of the
#     test REQUIRES these literals; they can't be moved to a
#     separately-allowlisted fixtures dir without breaking the
#     test's `fixture()` helper contract.
#
# What does NOT belong on this list:
#   Real source files that happened to fire a FP — those should
#   either use the `// pragma: allowlist secret` inline carve-out
#   (project convention from CLAUDE.md) OR move their literal
#   into `tests/fixtures/secrets/` (the auto-skipped dir already
#   recognized by `tests/guardrails/no-secrets.test.ts`).
# ─────────────────────────────────────────────────────────────────

paths-ignore:
    - ".secret-patterns"
    - "tests/unit/security/detect-secrets.test.ts"
    # Mirror the existing local-scanner convention — anything
    # under `tests/fixtures/secrets/` is intentional sample data.
    - "tests/fixtures/secrets/**"
