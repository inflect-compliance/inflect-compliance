# ───────────────────────────────────────────────────────────────
#  Bundle Analyze — client/server JS payload report
#
#  Generates @next/bundle-analyzer HTML reports as a build artefact so
#  the JS payload of the heavy client pages (Controls/Evidence/Risks/…)
#  is measurable. Part of the perf measurement foundation — this job
#  does NOT gate on size deltas (that's a later phase); it only produces
#  the report.
#
#  Runs on: push to main, and PRs labelled `perf-watch` (opt-in, so we
#  don't pay a full analyze build on every PR).
# ───────────────────────────────────────────────────────────────
name: Bundle Analyze

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

concurrency:
  group: bundle-analyze-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: "Analyze client/server bundles"
    # Push to main always; PRs only when labelled perf-watch.
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'perf-watch')
    # Match the main CI Build job's runner — the analyzer build is heavier than
    # a plain `next build` and OOMs on a small runner's heap.
    runs-on: ${{ vars.LARGE_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node + Prisma
        uses: ./.github/actions/setup-node-prisma

      - name: Build with bundle analyzer
        env:
          # Analysis build — real env vars are provided at runtime, not
          # needed to measure bundle size.
          SKIP_ENV_VALIDATION: '1'
          NEXT_TELEMETRY_DISABLED: '1'
          # The bundle-analyzer plugin holds the full module graph + stats in
          # memory ON TOP of the Next build, so it needs more heap than the
          # plain Build job (which runs fine at 6144). As the app grew, the
          # analyzer started hitting the V8 heap ceiling at ~6083 MB (exit 134,
          # "Reached heap limit"), so it OOM'd every main run. Raise the ceiling
          # to 8192 (the repo's standard heavy-build bump, matching the
          # heap-bumped tsc) — V8 grows lazily, so this only lets the analyzer
          # climb past the 6144 wall to the ~6.5 GB it actually needs; it fits a
          # 16 GB large runner comfortably and the standard runner's RAM too.
          NODE_OPTIONS: '--max-old-space-size=8192'
          # `npm run analyze` → `npm run build`, which runs
          # `scripts/validate-env.ts` before `next build`. That script hard-
          # checks `DATABASE_URL` (it predates SKIP_ENV_VALIDATION and does not
          # honour it), so a dummy value is required or the analyze build fails
          # before it starts — mirrors the dummy DSNs the CI test/build jobs use.
          DATABASE_URL: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
          DIRECT_DATABASE_URL: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
        run: npm run analyze

      - name: Enforce per-route First Load JS budgets
        # The build above produced .next/app-build-manifest.json, so the
        # budget gate is live here (it skips in the no-build jest job).
        run: npx jest tests/guardrails/bundle-size-budget.test.ts --no-coverage

      # Only needed to inspect what grew when a budget FAILS — the
      # per-route budget gate above already runs inline, so the HTML is
      # never read on a green run. Gate on failure to stop storage creep.
      - name: Upload bundle report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: bundle-analysis
          path: .next/analyze/*.html
          if-no-files-found: warn
          retention-days: 7
