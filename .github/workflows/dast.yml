name: DAST (ZAP Baseline)

# Dynamic application security testing — the runtime complement to the
# repo's STATIC gates (CodeQL SAST, Trivy container CVEs, npm audit).
# Boots the full Next.js app + Postgres + Redis stack and runs an OWASP
# ZAP **Baseline** (passive) scan against it: missing security headers,
# cacheable-sensitive-content, info disclosure, cookie flags, etc.
#
# Scope (see docs/dast.md):
#   - Baseline (passive) only. The Full/active scan (destructive request
#     mutation — XSS/SQLi probes) is a separate WEEKLY workflow follow-up.
#   - AUTHENTICATED, MULTI-ROLE. A per-role matrix logs in as each seeded
#     role (OWNER/EDITOR/READER/AUDITOR) via the real NextAuth credentials
#     flow and scans that role's reachable surface. NOTE: this is per-role
#     PASSIVE surface coverage, NOT automated broken-access-control
#     detection (BAC is enforced + tested at the app layer:
#     tenant-crud-authz-parity + requirePermission; true BAC scanning
#     would need ZAP's Access Control add-on / Automation Framework).
#   - NON-BLOCKING for the first 30 days (fail_action: false +
#     continue-on-error) while the .zap/rules.tsv allowlist is curated.
on:
  workflow_dispatch:
  schedule:
    # 04:00 UTC daily — off-peak; deliberately after the 03:30 UTC load
    # test so the two full-app boots don't compete for a runner.
    - cron: '0 4 * * *'

# The scan only reads the running app + writes a SARIF to the Security
# tab and (optionally) opens an issue — it needs security-events write
# and issues write, nothing else.
permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  zap-baseline:
    name: "ZAP Baseline (${{ matrix.user.role }})"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # One scan per seeded role. fail-fast: false so one role's scan
    # failing never cancels the others. The four jobs run in parallel
    # (isolated runners + services), so wall-clock ≈ a single scan;
    # runner-minutes are ~4×. (No distinct ADMIN-role seed user exists —
    # OWNER covers the admin tier; add an admin@ seed if ADMIN-specific
    # surface coverage is later needed.)
    strategy:
      fail-fast: false
      matrix:
        user:
          - { role: owner, email: 'admin@acme.com' }
          - { role: editor, email: 'editor@acme.com' }
          - { role: reader, email: 'viewer@acme.com' }
          - { role: auditor, email: 'auditor@acme.com' }

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    # Mirrors load-test.yml verbatim so the scanned app is a
    # representative production-build boot against a seeded tenant tree.
    env:
      DATABASE_URL: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public&pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
      REDIS_URL: redis://localhost:6379
      AUTH_TEST_MODE: '1'
      RATE_LIMIT_ENABLED: '0'
      AUTH_SECRET: ci-dast-secret-do-not-use-in-prod
      NEXTAUTH_URL: http://localhost:3006
      NEXTAUTH_SECRET: ci-dast-secret-do-not-use-in-prod
      DATA_ENCRYPTION_KEY: ci-dast-data-encryption-key-32bytes
      # See load-test.yml: NODE_ENV is set inline on build/start, not at
      # job level, so `npm ci` keeps devDeps (patch-package postinstall).
      PORT: '3006'
      SKIP_ENV_VALIDATION: '1'

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node + Prisma client
        uses: ./.github/actions/setup-node-prisma
        with:
          node-version: '24'

      # RLS migrations GRANT ... TO app_user; create the roles first
      # (identical to load-test.yml / ci.yml DB jobs).
      - name: Create PostgreSQL roles for RLS
        run: |
          PGPASSWORD=ci_password psql -h localhost -U ci -d ci_testdb <<'SQL'
          DO $$ BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'app_user') THEN CREATE ROLE app_user NOLOGIN; END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'postgres') THEN CREATE ROLE postgres NOLOGIN; END IF;
          END $$;
          GRANT app_user TO ci;
          GRANT app_user TO postgres;
          SQL

      - name: Apply migrations + seed
        run: |
          npx prisma migrate deploy
          npm run db:seed

      - name: Build app
        env:
          NODE_ENV: production
        run: npm run build

      - name: Start app (background)
        env:
          NODE_ENV: production
        run: |
          npm start > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3006/api/health > /dev/null 2>&1; then
              echo "App is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "App failed to start within 60s. Last 100 lines of log:"
          tail -n 100 /tmp/app.log || true
          exit 1

      # ── Authenticate as the matrix role's seed user ──
      # action-baseline has no context/auth inputs — its only auth
      # mechanism is header injection (ZAP_AUTH_HEADER*). So we perform
      # the real NextAuth v4 credentials login here (CSRF token → callback)
      # and hand ZAP the resulting session cookie, so the scan covers gated
      # /api/t/<slug>/** + /t/<slug>/** routes as the logged-in role.
      # (Over http://localhost the session cookie is `next-auth.session-token`
      # — no `__Secure-` prefix without HTTPS. Seed users from prisma/seed.ts.)
      - name: Log in as ${{ matrix.user.role }} (capture NextAuth session cookie)
        env:
          LOGIN_EMAIL: ${{ matrix.user.email }}
        run: |
          set -euo pipefail
          JAR="$(mktemp)"
          CSRF="$(curl -fsS -c "$JAR" http://localhost:3006/api/auth/csrf \
            | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>process.stdout.write(JSON.parse(d).csrfToken))')"
          curl -fsS -c "$JAR" -b "$JAR" -X POST http://localhost:3006/api/auth/callback/credentials \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode "csrfToken=$CSRF" \
            --data-urlencode "email=$LOGIN_EMAIL" \
            --data-urlencode "password=password123" \
            --data-urlencode "callbackUrl=http://localhost:3006/" \
            --data-urlencode "json=true" -o /dev/null
          SESSION="$(awk '$6=="next-auth.session-token"{print $7}' "$JAR")"
          if [ -z "$SESSION" ]; then
            echo "::error::No next-auth.session-token captured — login failed for $LOGIN_EMAIL (cookie jar below)"; cat "$JAR"; exit 1
          fi
          echo "::add-mask::$SESSION"
          # Sanity: the cookie must actually authenticate an API call.
          code="$(curl -s -o /dev/null -w '%{http_code}' -H "Cookie: next-auth.session-token=$SESSION" http://localhost:3006/api/auth/me)"
          echo "/api/auth/me as $LOGIN_EMAIL → HTTP $code"
          if [ "$code" != "200" ]; then echo "::error::Session cookie did not authenticate /api/auth/me (HTTP $code)"; exit 1; fi
          # Hand the cookie to ZAP via its header-injection env vars.
          {
            echo "ZAP_AUTH_HEADER=Cookie"
            echo "ZAP_AUTH_HEADER_SITE=localhost:3006"
            echo "ZAP_AUTH_HEADER_VALUE=next-auth.session-token=$SESSION"
          } >> "$GITHUB_ENV"

      # ── ZAP Baseline (passive) scan ──
      # The action runs ZAP in a container, spiders the target, runs the
      # passive rules, applies the .zap/rules.tsv allowlist, writes
      # report_html.html / report_md.md / report_json.json to the
      # workspace, and (on findings) opens/updates a GitHub issue.
      - name: ZAP Baseline scan (${{ matrix.user.role }})
        # Non-blocking for the 30-day tuning window: action-baseline exits
        # non-zero on WARN findings and `fail_action: false` alone does NOT
        # reliably keep the run green in v0.13.0, so continue-on-error is
        # the definitive non-blocking switch. Findings still flow to the
        # Security tab + the auto-issue for triage. On 2026-07-24, REMOVE
        # this line AND set fail_action: true to make HIGH+ blocking.
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:3006'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-z "-config api.disablekey=true"'
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_title: 'ZAP Baseline Findings — ${{ matrix.user.role }} (nightly)'
          allow_issue_writing: true
          # Per-role artifact name so the four matrix jobs don't collide.
          artifact_name: 'zap_scan_${{ matrix.user.role }}'
          # Non-blocking until 2026-07-24 — flip to fail_action: true once
          # the .zap/rules.tsv allowlist is stable (mirrors the Trivy
          # HIGH+ gate posture). Tracked + guarded by
          # tests/guardrails/dast-workflow-pinning.test.ts.
          fail_action: false

      # ── Reporting (informational; mirrors the Trivy SARIF pattern) ──
      # action-baseline does not emit SARIF, so convert its JSON report
      # with a small dependency-free script. Best-effort: a missing/empty
      # report must not fail this (non-blocking) workflow.
      - name: Convert ZAP report to SARIF
        if: always()
        run: |
          node .zap/zap-json-to-sarif.mjs report_json.json > zap-results.sarif || \
            printf '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"OWASP ZAP Baseline","rules":[]}},"results":[]}]}\n' > zap-results.sarif

      - name: Upload ZAP SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: zap-results.sarif
          # Per-role category → a distinct Security-tab analysis per role.
          category: zap-baseline-${{ matrix.user.role }}

      - name: Upload ZAP HTML report (triage artifact)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-baseline-report-${{ matrix.user.role }}
          path: |
            report_html.html
            report_md.md
            report_json.json
          if-no-files-found: warn
          retention-days: 7
