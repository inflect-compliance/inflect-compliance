# ───────────────────────────────────────────────────────────────
#  Restore Test — monthly automated RDS restore validation
#
#  Epic OI-3 source-of-truth: monthly automated restore test that
#  restores the latest backup to a temporary instance, runs smoke
#  tests, and tears it down.
#
#  Schedule: 04:00 UTC on the 1st of every month. Also triggerable
#  manually via workflow_dispatch (e.g. after a major schema
#  migration that warrants a fresh restore-validation cycle).
#
#  REQUIRED GITHUB CONFIGURATION:
#    Repo Settings → Environments → production:
#      Secrets:
#        AWS_ROLE_TO_ASSUME           — IAM role with rds:* + secretsmanager:GetSecretValue
#        SOURCE_DB_INSTANCE_ID        — e.g. inflect-compliance-production-db
#        DB_PASSWORD_SECRET_ID        — RDS-managed secret ARN (from terraform output)
#        RESTORE_DB_SUBNET_GROUP      — e.g. inflect-compliance-production-db-subnet-group
#        RESTORE_VPC_SECURITY_GROUP_IDS — comma-separated SG IDs
#                                          allowing ingress from the
#                                          self-hosted runner's IP
#  REQUIRED VARS:
#        AWS_REGION                   — e.g. us-east-1
#
#  Network prerequisite: this workflow MUST run on a self-hosted
#  runner inside the production VPC (or with a Session Manager port
#  forwarder set up to reach the temporary RDS). The chart's DB
#  module hardcodes publicly_accessible=false; we don't relax that
#  for the test instance. If you don't have a self-hosted runner,
#  trigger restore-test.sh manually from an in-VPC bastion EC2.
#
#  On failure: fires a Slack/PagerDuty alert via the alerting
#  pipeline (the script's exit code propagates; the workflow run's
#  failure is the canonical signal).
# ───────────────────────────────────────────────────────────────
name: Restore Test

on:
  schedule:
    # 04:00 UTC on the 1st of every month — well outside the
    # production maintenance window (Sun 04:30-05:30 UTC per the
    # Terraform DB module default), and outside business hours
    # for most timezones we operate in.
    - cron: "0 4 1 * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually? (audit trail)"
        required: false
        default: "manual restore validation"

permissions:
  contents: read
  id-token: write   # OIDC

concurrency:
  # Only one restore test runs at a time — collisions would burn
  # AWS quota and clutter the snapshot list.
  group: restore-test
  cancel-in-progress: false

jobs:
  restore-test:
    name: "Restore Test (production)"
    runs-on: ubuntu-latest   # ⚠ replace with [self-hosted, vpc-prod] in production
    timeout-minutes: 90      # restore alone can take 60+ minutes
    environment: production  # gates AWS_ROLE_TO_ASSUME + the in-VPC SG secrets

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: gh-restore-test-${{ github.run_id }}

      - name: Install psql + jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client jq

      - name: Run restore-test.sh
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          SOURCE_DB_INSTANCE_ID: ${{ secrets.SOURCE_DB_INSTANCE_ID }}
          RESTORE_DB_INSTANCE_CLASS: db.t4g.small
          RESTORE_VPC_SECURITY_GROUP_IDS: ${{ secrets.RESTORE_VPC_SECURITY_GROUP_IDS }}
          RESTORE_DB_SUBNET_GROUP: ${{ secrets.RESTORE_DB_SUBNET_GROUP }}
          DB_NAME: inflect_compliance
          DB_USER: postgres
          DB_PASSWORD_SECRET_ID: ${{ secrets.DB_PASSWORD_SECRET_ID }}
        run: |
          ./infra/scripts/restore-test.sh

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## Restore Test"
            echo ""
            echo "- **Triggered by:** ${{ github.event_name }}"
            echo "- **Reason:** ${{ github.event.inputs.reason || 'scheduled' }}"
            echo "- **Source DB:** ${{ secrets.SOURCE_DB_INSTANCE_ID }}"
            echo "- **Region:** ${{ vars.AWS_REGION }}"
            echo "- **Result:** ${{ job.status }}"
            echo "- **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            if [ "${{ job.status }}" != "success" ]; then
              echo "### ⚠ Action required"
              echo ""
              echo "Restore test failed. Investigate before the next maintenance window."
              echo "The temporary RDS instance was deleted by the script's cleanup trap."
              echo "If the script crashed before reaching cleanup, check for orphaned"
              echo "instances:"
              echo ""
              echo "  aws rds describe-db-instances \\"
              echo "    --query 'DBInstances[?contains(DBInstanceIdentifier, \`restore-test\`)]'"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
