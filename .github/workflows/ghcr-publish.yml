#
# GHCR publish — fast-path build + push for Watchtower auto-deploy.
#
# Runs on every push to `main` (in parallel with CI). Pushes an
# image tagged `:latest` and `:sha-<short>` to GHCR. The VM's
# Watchtower container polls :latest and rolls the running app.
#
# Separate from the heavier `deploy.yml` pipeline (which gates on
# CI + has staging/production environments) — this one exists purely
# so `git push` → running in prod is ~5 min.
#
name: Publish image to GHCR

on:
    push:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: ghcr-publish-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build-push:
        # Match the CI "Docker Build" job's robustness — the image build
        # (npm ci + next build + worker bundle + layers) outgrew a plain
        # ubuntu-latest with a 20-minute budget once the app grew.
        runs-on: ${{ vars.LARGE_RUNNER || 'ubuntu-latest' }}
        timeout-minutes: 40

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            # Reclaim ~25-30 GB of preinstalled toolchains so the container
            # build has disk headroom (mirrors the CI Docker Build job).
            - name: Free runner disk space (issue #1005)
              run: |
                  sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
                  sudo docker image prune --all --force 2>/dev/null || true
                  df -h /

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract image tags
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest
                      type=sha,prefix=sha-,format=short
                  # Lowercase is required by GHCR — metadata-action handles it
                  # via the default `image` normalisation.
                  flavor: |
                      latest=false

            # The GHA buildx cache backend (type=gha) intermittently 404s on
            # IMPORT — Azure GC's a layer blob the manifest still references,
            # so buildkit aborts with "BlobNotFound" even though the image is
            # fine. Same two-layer hardening as the CI Docker Build job:
            #   - `cache-to: …,ignore-error=true` — a failed EXPORT never fails.
            #   - `continue-on-error` here + the cacheless retry below — if the
            #     cache IMPORT 404s, rebuild without cache-from. A genuine
            #     build error still fails (the retry fails too).
            - name: Build and push
              id: build
              uses: docker/build-push-action@v7
              continue-on-error: true
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max,ignore-error=true
                  platforms: linux/amd64

            # Cacheless retry — only when the cached build above failed (cache
            # 404 or any other error). No cache-from, so a stale cache
            # reference can't abort it; if THIS fails too it's a real build
            # error and the job fails as it should.
            - name: Build and push (cacheless retry on cache flake)
              if: steps.build.outcome == 'failure'
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-to: type=gha,mode=max,ignore-error=true
                  platforms: linux/amd64
