name: Load Test (k6)

# Load tests are expensive (full app boot + sustained traffic), so we
# run them on-demand via workflow_dispatch rather than on every PR.
# Triggers:
#   - manual: pick a scenario + VU count from the Actions UI
#   - nightly main: trend-tracking baseline (smoke level — 25 VUs, 1m)
on:
  workflow_dispatch:
    inputs:
      scenario:
        type: choice
        description: Scenario to run
        options:
          - both
          - auth
          - lists
        default: both
      vus:
        description: Virtual users (concurrency target)
        default: '50'
      duration:
        description: Sustained duration (e.g. 2m, 5m)
        default: '2m'
  schedule:
    # 03:30 UTC daily — light smoke baseline on main for trend tracking.
    # Doesn't block anything; alerts via the artifact diff if budgets drift.
    - cron: '30 3 * * *'

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public&pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
      REDIS_URL: redis://localhost:6379
      AUTH_TEST_MODE: '1'
      RATE_LIMIT_ENABLED: '0'
      AUTH_SECRET: ci-load-test-secret-do-not-use-in-prod
      NEXTAUTH_URL: http://localhost:3006
      NEXTAUTH_SECRET: ci-load-test-secret-do-not-use-in-prod
      DATA_ENCRYPTION_KEY: ci-load-test-data-encryption-key-32b
      # NODE_ENV intentionally NOT set at the job level. Setting it
      # to "production" here causes `npm ci` to skip
      # devDependencies — which includes `patch-package`. The
      # repo's `postinstall` hook then invokes `patch-package`,
      # can't find it on PATH, and exits 127. The Build + Start
      # steps below set NODE_ENV=production inline so the app
      # still runs as a production build.
      PORT: '3006'
      SKIP_ENV_VALIDATION: '1'

    steps:
      - uses: actions/checkout@v7

      # Node + npm ci + `prisma generate` (all with retry). The seed
      # step (`tsx prisma/seed.ts`) needs the generated client — a bare
      # `npm ci` does NOT generate it (postinstall only runs
      # patch-package), so use the same composite as ci.yml's DB jobs.
      - name: Setup Node + Prisma client
        uses: ./.github/actions/setup-node-prisma
        with:
          node-version: '24'

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      # ── Create roles required by RLS migrations ──
      # The RLS migrations `GRANT ... TO app_user`; without the role,
      # `prisma migrate deploy` aborts with `role "app_user" does not
      # exist`. Mirrors the identical step in ci.yml's DB jobs.
      - name: Create PostgreSQL roles for RLS
        run: |
          PGPASSWORD=ci_password psql -h localhost -U ci -d ci_testdb <<'SQL'
          DO $$ BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'app_user') THEN CREATE ROLE app_user NOLOGIN; END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'postgres') THEN CREATE ROLE postgres NOLOGIN; END IF;
          END $$;
          GRANT app_user TO ci;
          GRANT app_user TO postgres;
          SQL

      - name: Apply migrations + seed
        run: |
          npx prisma migrate deploy
          npm run db:seed

      - name: Build app
        env:
          NODE_ENV: production
        run: npm run build

      - name: Start app (background)
        env:
          NODE_ENV: production
        run: |
          npm start > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3006/api/health > /dev/null 2>&1; then
              echo "App is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "App failed to start within 60s. Last 100 lines of log:"
          tail -n 100 /tmp/app.log || true
          exit 1

      - name: Pick parameters (manual vs scheduled)
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "scenario=${{ inputs.scenario }}" >> "$GITHUB_OUTPUT"
            echo "vus=${{ inputs.vus }}" >> "$GITHUB_OUTPUT"
            echo "duration=${{ inputs.duration }}" >> "$GITHUB_OUTPUT"
          else
            # Nightly smoke — keep it light and fast.
            echo "scenario=both" >> "$GITHUB_OUTPUT"
            echo "vus=25" >> "$GITHUB_OUTPUT"
            echo "duration=1m" >> "$GITHUB_OUTPUT"
          fi

      # k6's handleSummary writes to tests/load/results/*.json; the dir
      # isn't in the repo, so without this the summary write fails with
      # "no such file or directory" and the artifact upload is empty.
      - name: Prepare k6 results dir
        run: mkdir -p tests/load/results

      # continue-on-error: the load test is a trend tracker, not a gate
      # ("Doesn't block anything; alerts via the artifact diff if budgets
      # drift" — see the header comment). A crossed threshold makes k6
      # exit 99; without this the scheduled run goes red on a known
      # budget drift (e.g. bcrypt-bound login latency under VU
      # concurrency on CI's 2 vCPUs). The thresholds still evaluate and
      # the ✓/✗ + numbers land in the uploaded artifact for trend review.
      - name: Run k6 — auth scenario
        if: steps.params.outputs.scenario == 'auth' || steps.params.outputs.scenario == 'both'
        continue-on-error: true
        run: |
          k6 run \
            -e VUS=${{ steps.params.outputs.vus }} \
            -e DURATION=${{ steps.params.outputs.duration }} \
            tests/load/auth.js

      - name: Run k6 — lists scenario
        if: steps.params.outputs.scenario == 'lists' || steps.params.outputs.scenario == 'both'
        continue-on-error: true
        run: |
          k6 run \
            -e VUS=${{ steps.params.outputs.vus }} \
            -e DURATION=${{ steps.params.outputs.duration }} \
            tests/load/lists.js

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/app.pid ]; then
            kill "$(cat /tmp/app.pid)" 2>/dev/null || true
          fi

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-results-${{ github.run_id }}
          path: |
            tests/load/results/*.json
            /tmp/app.log
          retention-days: 7
