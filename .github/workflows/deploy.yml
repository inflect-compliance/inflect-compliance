# ───────────────────────────────────────────────────────────────
#  Deploy — Helm-based Kubernetes deployment
#
#  The chart lives at infra/helm/inflect/. The shared helm logic is
#  the composite action at .github/actions/helm-deploy.
#
#  ── Release governance: the staging smoke gate ──
#
#  A production deploy is STRUCTURALLY GATED behind staging. One
#  workflow run, for a `production` target, executes:
#
#    gate → build-image → deploy-staging → smoke-staging
#                                              │
#                                              ▼  (gate)
#                                         deploy-production → smoke-production
#
#  `deploy-production` declares `needs: [smoke-staging]`. GitHub
#  Actions will not start a job whose `needs` dependency failed —
#  so production CANNOT deploy unless the EXACT SAME image first
#  passed staging deploy + staging smoke. The dependency is explicit
#  in the job graph, not implicit ordering.
#
#  For a `staging` target the run stops after smoke-staging
#  (deploy-production / smoke-production are `if`-skipped).
#
#  Two layers protect production, in order:
#    1. staging smoke must pass         (this workflow's `needs:`)
#    2. a human approves the prod stage (the `production` GitHub
#       Environment's required-reviewers rule, enforced on the
#       `deploy-production` job)
#
#  The staging-gate wiring is locked by
#  tests/guards/deploy-staging-gate.test.ts — CI fails if the
#  `needs: smoke-staging` edge is ever removed.
#
#  Triggers: workflow_dispatch (manual).
#
#  REQUIRED GITHUB CONFIGURATION:
#    Repo Settings → Environments → {staging, production}:
#      Secrets:
#        AWS_ROLE_TO_ASSUME — IAM role ARN for OIDC assume-role
#        EKS_CLUSTER_NAME   — EKS cluster name in this AWS account
#      Variables:
#        SMOKE_URL          — base URL for the smoke test (https://...)
#      Protection rules (production only):
#        REQUIRED REVIEWERS — at least one. The human approval gate.
# ───────────────────────────────────────────────────────────────
name: Deploy

on:
  # Manual only. Auto-deploy on CI pass remains commented as before
  # — re-enable the workflow_run trigger once the staging EKS env is
  # provisioned end-to-end and the smoke-test SLO is validated.
  workflow_dispatch:
    inputs:
      environment:
        description: >-
          How far to promote. `staging` = deploy + smoke staging only.
          `production` = deploy + smoke staging, then (after staging
          smoke passes AND a reviewer approves) deploy + smoke prod.
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      ref:
        description: "Git ref to deploy (branch, tag, SHA). Blank = current main."
        required: false
        default: ""
      image_tag:
        description: "Container image tag to deploy. Blank = derive from ref (short SHA)."
        required: false
        default: ""

concurrency:
  # One deploy at a time, full stop. A `production` run touches the
  # staging environment too (it deploys + smokes staging first), so
  # the group is global rather than per-env — two runs must never
  # race over the staging release.
  group: deploy
  cancel-in-progress: false # never cancel an in-progress deploy

permissions:
  contents: read
  packages: write   # GHCR push
  id-token: write   # OIDC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_REGION: us-east-1
  HELM_VERSION: "3.14.0"
  HELM_TIMEOUT: 10m
  HELM_HISTORY_MAX: "10"
  CHART_PATH: infra/helm/inflect

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  1. Gate — resolve target env + image tag
  # ═══════════════════════════════════════════════════════════════
  gate:
    name: "Gate: resolve target"
    runs-on: ubuntu-latest
    outputs:
      target-env: ${{ steps.resolve.outputs.environment }}
      deploy-ref: ${{ steps.resolve.outputs.ref }}
      image-tag: ${{ steps.resolve.outputs.image_tag }}
    steps:
      - name: Resolve target environment + image tag
        id: resolve
        run: |
          set -euo pipefail
          ENV="${{ github.event.inputs.environment }}"
          REF="${{ github.event.inputs.ref || github.sha }}"
          INPUT_TAG="${{ github.event.inputs.image_tag }}"
          # Image tag — explicit input wins; fall back to short-SHA of the ref
          if [ -n "$INPUT_TAG" ]; then
            IMAGE_TAG="$INPUT_TAG"
          else
            # Resolve full SHA (handles branch + tag + short-SHA refs)
            FULL_SHA="$(git ls-remote https://github.com/${{ github.repository }}.git "$REF" | awk '{print $1}' | head -n1)"
            if [ -z "$FULL_SHA" ]; then FULL_SHA="$REF"; fi
            IMAGE_TAG="$(echo "$FULL_SHA" | cut -c1-12)"
          fi

          echo "environment=$ENV"      >> $GITHUB_OUTPUT
          echo "ref=$REF"              >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG"  >> $GITHUB_OUTPUT
          if [ "$ENV" = "production" ]; then
            echo "::notice::Target: production — will deploy+smoke STAGING first, then (gated) production. Ref $REF, image tag $IMAGE_TAG."
          else
            echo "::notice::Target: staging only. Ref $REF, image tag $IMAGE_TAG."
          fi

  # ═══════════════════════════════════════════════════════════════
  #  2. Build & Push — container image to GHCR. Built ONCE; the same
  #     artefact is promoted staging → production.
  # ═══════════════════════════════════════════════════════════════
  build-image:
    name: "Build & Push image"
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image-ref: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.gate.outputs.deploy-ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.gate.outputs.image-tag }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          {
            echo "### 🐳 Image Built"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| **Tag** | \`${{ needs.gate.outputs.image-tag }}\` |"
            echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |"
            echo "| **Target** | ${{ needs.gate.outputs.target-env }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════
  #  3. Deploy: staging — ALWAYS runs (both staging and production
  #     targets deploy to staging first).
  # ═══════════════════════════════════════════════════════════════
  deploy-staging:
    name: "Deploy: staging"
    needs: [gate, build-image]
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.gate.outputs.deploy-ref }}

      - name: Helm deploy (staging)
        uses: ./.github/actions/helm-deploy
        with:
          environment: staging
          release-name: inflect-staging
          namespace: inflect-staging
          image-tag: ${{ needs.gate.outputs.image-tag }}
          image-repository: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          chart-path: ${{ env.CHART_PATH }}
          aws-region: ${{ env.AWS_REGION }}
          aws-role: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          eks-cluster: ${{ secrets.EKS_CLUSTER_NAME }}
          helm-version: ${{ env.HELM_VERSION }}
          helm-timeout: ${{ env.HELM_TIMEOUT }}
          helm-history-max: ${{ env.HELM_HISTORY_MAX }}

  # ═══════════════════════════════════════════════════════════════
  #  4. Smoke: staging — THE GATE. `deploy-production` needs this
  #     job; if it fails, production never deploys.
  # ═══════════════════════════════════════════════════════════════
  smoke-staging:
    name: "Smoke: staging"
    needs: [gate, deploy-staging]
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Smoke test (staging)
        # scripts/smoke-prod.mjs is the generic post-deploy validator
        # (livez / readyz / health / login / auth-session, with
        # retries) — despite the name it is not prod-specific. It runs
        # against whatever SMOKE_URL the GitHub Environment provides;
        # here `environment: staging` resolves SMOKE_URL to staging.
        env:
          SMOKE_URL: ${{ vars.SMOKE_URL }}
          SMOKE_RETRIES: "5"
          SMOKE_RETRY_DELAY: "10000"
          SMOKE_TIMEOUT_MS: "15000"
        run: |
          if [ -z "$SMOKE_URL" ]; then
            echo "::error::SMOKE_URL variable is not set for the staging GitHub Environment."
            echo "Configure it in repo Settings → Environments → staging → Variables."
            exit 1
          fi
          echo "Smoke-testing staging at $SMOKE_URL"
          node scripts/smoke-prod.mjs

      - name: Staging smoke summary
        if: success()
        run: |
          {
            echo "### ✅ Staging smoke passed — production deploy unblocked"
            echo ""
            echo "- **Ref:** \`${{ needs.gate.outputs.deploy-ref }}\` (image tag \`${{ needs.gate.outputs.image-tag }}\`)"
            echo "- **Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            if [ "${{ needs.gate.outputs.target-env }}" = "production" ]; then
              echo "- **Next:** production deploy awaits required-reviewer approval."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════
  #  5. Deploy: production — GATED.
  #     `needs: smoke-staging` → cannot start unless staging smoke
  #     passed. `environment: production` → required-reviewer
  #     approval on top. Only runs for a `production` target.
  # ═══════════════════════════════════════════════════════════════
  deploy-production:
    name: "Deploy: production"
    needs: [gate, build-image, smoke-staging]
    if: needs.gate.outputs.target-env == 'production'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.gate.outputs.deploy-ref }}

      - name: Helm deploy (production)
        uses: ./.github/actions/helm-deploy
        with:
          environment: production
          release-name: inflect-production
          namespace: inflect-production
          image-tag: ${{ needs.gate.outputs.image-tag }}
          image-repository: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          chart-path: ${{ env.CHART_PATH }}
          aws-region: ${{ env.AWS_REGION }}
          aws-role: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          eks-cluster: ${{ secrets.EKS_CLUSTER_NAME }}
          helm-version: ${{ env.HELM_VERSION }}
          helm-timeout: ${{ env.HELM_TIMEOUT }}
          helm-history-max: ${{ env.HELM_HISTORY_MAX }}

  # ═══════════════════════════════════════════════════════════════
  #  6. Smoke: production — post-deploy validation.
  # ═══════════════════════════════════════════════════════════════
  smoke-production:
    name: "Smoke: production"
    needs: [gate, deploy-production]
    if: needs.gate.outputs.target-env == 'production'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Smoke test (production)
        env:
          SMOKE_URL: ${{ vars.SMOKE_URL }}
          SMOKE_RETRIES: "5"
          SMOKE_RETRY_DELAY: "10000"
          SMOKE_TIMEOUT_MS: "15000"
        run: |
          if [ -z "$SMOKE_URL" ]; then
            echo "::error::SMOKE_URL variable is not set for the production GitHub Environment."
            echo "Configure it in repo Settings → Environments → production → Variables."
            exit 1
          fi
          echo "Smoke-testing production at $SMOKE_URL"
          node scripts/smoke-prod.mjs

      - name: Invalidate CloudFront cache
        if: success()
        env:
          CF_DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -z "$CF_DIST_ID" ]; then
            echo "::notice::CLOUDFRONT_DISTRIBUTION_ID not set — no CDN edge tier in front of this environment; skipping invalidation."
            exit 0
          fi
          # Targeted bust: only the build-output paths change between
          # releases — /_next/* (hashed bundles + image-optimizer output)
          # and the HTML shell at /. Static public/* assets are
          # operator-managed and expire naturally. Requires AWS creds in
          # this job (OIDC role) — see docs/cdn.md.
          aws cloudfront create-invalidation \
            --distribution-id "$CF_DIST_ID" \
            --paths '/_next/*' '/'

      - name: Post smoke summary
        if: success()
        run: |
          {
            echo "### ✅ Deploy + Smoke complete — production"
            echo ""
            echo "- **Ref:** \`${{ needs.gate.outputs.deploy-ref }}\` (image tag \`${{ needs.gate.outputs.image-tag }}\`)"
            echo "- **Validated:** staging smoke → production deploy → production smoke"
            echo "- **Checks:** livez, readyz, health, login, auth session"
            echo "- **Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          } >> "$GITHUB_STEP_SUMMARY"
