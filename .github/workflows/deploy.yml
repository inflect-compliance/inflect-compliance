# ───────────────────────────────────────────────────────────────
#  Deploy — Helm-based Kubernetes deployment
#
#  Replaced the SSH + docker-compose path (Epic OI-2). The chart
#  lives at infra/helm/inflect/. Deployment is now:
#
#    1. Build the app image and push to GHCR
#    2. OIDC into AWS, fetch kubeconfig for the target EKS cluster
#    3. helm upgrade --install with the env-specific values file
#    4. Smoke tests against the public URL
#
#  Triggers:
#    workflow_dispatch (manual, with environment + ref + image_tag inputs)
#
#  REQUIRED GITHUB CONFIGURATION:
#    Repo Settings → Environments → {staging, production}:
#      Secrets:
#        AWS_ROLE_TO_ASSUME — IAM role ARN for OIDC assume-role
#        EKS_CLUSTER_NAME   — EKS cluster name in this AWS account
#      Variables:
#        SMOKE_URL          — base URL for the smoke test (https://...)
#      Protection rules (production only):
#        REQUIRED REVIEWERS — at least one. This IS the manual gate.
#
#  Flow:
#    gate → build-image → deploy → smoke
# ───────────────────────────────────────────────────────────────
name: Deploy

on:
  # Manual only. Auto-deploy on CI pass remains commented as before
  # — re-enable the workflow_run trigger once the staging EKS env is
  # provisioned end-to-end and the smoke-test SLO is validated.
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      ref:
        description: "Git ref to deploy (branch, tag, SHA). Blank = current main."
        required: false
        default: ""
      image_tag:
        description: "Container image tag to deploy. Blank = derive from ref (short SHA)."
        required: false
        default: ""

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false # never cancel an in-progress deploy

permissions:
  contents: read
  packages: write   # GHCR push
  id-token: write   # OIDC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_REGION: us-east-1
  HELM_VERSION: "3.14.0"
  HELM_TIMEOUT: 10m
  HELM_HISTORY_MAX: "10"
  CHART_PATH: infra/helm/inflect

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  1. Gate — resolve target env + naming + image tag
  # ═══════════════════════════════════════════════════════════════
  gate:
    name: "Gate: resolve target"
    runs-on: ubuntu-latest
    outputs:
      target-env: ${{ steps.resolve.outputs.environment }}
      deploy-ref: ${{ steps.resolve.outputs.ref }}
      image-tag: ${{ steps.resolve.outputs.image_tag }}
      release-name: ${{ steps.resolve.outputs.release }}
      namespace: ${{ steps.resolve.outputs.namespace }}
    steps:
      - name: Resolve target environment + Helm naming
        id: resolve
        run: |
          set -euo pipefail
          ENV="${{ github.event.inputs.environment }}"
          REF="${{ github.event.inputs.ref || github.sha }}"
          INPUT_TAG="${{ github.event.inputs.image_tag }}"
          # Image tag — explicit input wins; fall back to short-SHA of the ref
          if [ -n "$INPUT_TAG" ]; then
            IMAGE_TAG="$INPUT_TAG"
          else
            # Resolve full SHA (handles branch + tag + short-SHA refs)
            FULL_SHA="$(git ls-remote https://github.com/${{ github.repository }}.git "$REF" | awk '{print $1}' | head -n1)"
            if [ -z "$FULL_SHA" ]; then FULL_SHA="$REF"; fi
            IMAGE_TAG="$(echo "$FULL_SHA" | cut -c1-12)"
          fi
          # Release + namespace naming convention — match the per-env
          # values file naming (values-{env}.yaml ↔ inflect-{env} release)
          RELEASE="inflect-$ENV"
          NAMESPACE="inflect-$ENV"

          echo "environment=$ENV"   >> $GITHUB_OUTPUT
          echo "ref=$REF"           >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "release=$RELEASE"   >> $GITHUB_OUTPUT
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT
          echo "::notice::Deploy target: $ENV (release=$RELEASE, ns=$NAMESPACE) at $REF (image tag $IMAGE_TAG)"

  # ═══════════════════════════════════════════════════════════════
  #  2. Build & Push — container image to GHCR. Skipped if the
  #     image_tag input was supplied AND already exists in GHCR
  #     (cheap reuse path for re-deploys of an existing artefact).
  # ═══════════════════════════════════════════════════════════════
  build-image:
    name: "Build & Push image"
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image-ref: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.deploy-ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.gate.outputs.image-tag }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          {
            echo "### 🐳 Image Built"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| **Tag** | \`${{ needs.gate.outputs.image-tag }}\` |"
            echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |"
            echo "| **Target** | ${{ needs.gate.outputs.target-env }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════
  #  3. Deploy — helm upgrade --install
  #     Production deploys are gated by the production GitHub
  #     Environment's required-reviewers rule.
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: "Deploy: ${{ needs.gate.outputs.target-env }}"
    needs: [gate, build-image]
    runs-on: ubuntu-latest
    environment: ${{ needs.gate.outputs.target-env }}
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.deploy-ref }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gh-deploy-${{ needs.gate.outputs.target-env }}-${{ github.run_id }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig (EKS)
        env:
          CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          if [ -z "$CLUSTER_NAME" ]; then
            echo "::error::EKS_CLUSTER_NAME secret is not set for the ${{ needs.gate.outputs.target-env }} GitHub Environment."
            exit 1
          fi
          aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME"
          kubectl version --client --output=yaml
          kubectl config current-context

      - name: Helm lint chart
        run: helm lint "${{ env.CHART_PATH }}"

      - name: Helm dry-run
        run: |
          helm upgrade --install \
            "${{ needs.gate.outputs.release-name }}" \
            "${{ env.CHART_PATH }}" \
            --namespace "${{ needs.gate.outputs.namespace }}" \
            --create-namespace \
            --values "${{ env.CHART_PATH }}/values-${{ needs.gate.outputs.target-env }}.yaml" \
            --set image.tag="${{ needs.gate.outputs.image-tag }}" \
            --set image.repository="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" \
            --dry-run \
            --debug \
            > /tmp/helm-dry-run.txt 2>&1 || (cat /tmp/helm-dry-run.txt && exit 1)
          echo "✓ Dry-run succeeded"

      - name: Helm upgrade --install
        id: helm
        run: |
          set -euo pipefail
          helm upgrade --install \
            "${{ needs.gate.outputs.release-name }}" \
            "${{ env.CHART_PATH }}" \
            --namespace "${{ needs.gate.outputs.namespace }}" \
            --create-namespace \
            --values "${{ env.CHART_PATH }}/values-${{ needs.gate.outputs.target-env }}.yaml" \
            --set image.tag="${{ needs.gate.outputs.image-tag }}" \
            --set image.repository="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" \
            --wait \
            --timeout "${{ env.HELM_TIMEOUT }}" \
            --history-max "${{ env.HELM_HISTORY_MAX }}" \
            --atomic
          # --atomic: rolls back to the previous revision if the upgrade fails
          # --wait: waits for resources to be ready before exiting
          # --history-max: keeps the last N revisions for `helm rollback`

      - name: Rollout summary
        if: always()
        env:
          RELEASE: ${{ needs.gate.outputs.release-name }}
          NS: ${{ needs.gate.outputs.namespace }}
        run: |
          {
            echo "## Helm rollout: ${{ needs.gate.outputs.target-env }}"
            echo ""
            echo "**Release:** \`$RELEASE\` in namespace \`$NS\`"
            echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.gate.outputs.image-tag }}\`"
            echo ""
            echo "### Helm history (last 5)"
            echo '```'
            helm history "$RELEASE" --namespace "$NS" --max 5 || echo "(no history available)"
            echo '```'
            echo ""
            echo "### Pods"
            echo '```'
            kubectl --namespace "$NS" get pods \
              -l "app.kubernetes.io/instance=$RELEASE" \
              -o wide || echo "(no pods)"
            echo '```'
            echo ""
            echo "### Rollback (if needed)"
            echo '```bash'
            echo "helm rollback $RELEASE --namespace $NS"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════
  #  4. Smoke — post-deploy validation against the public URL.
  # ═══════════════════════════════════════════════════════════════
  smoke:
    name: "Smoke: ${{ needs.gate.outputs.target-env }}"
    needs: [gate, deploy]
    runs-on: ubuntu-latest
    environment: ${{ needs.gate.outputs.target-env }}
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Smoke test
        env:
          SMOKE_URL: ${{ vars.SMOKE_URL }}
          SMOKE_RETRIES: "5"
          SMOKE_RETRY_DELAY: "10000"
          SMOKE_TIMEOUT_MS: "15000"
        run: |
          if [ -z "$SMOKE_URL" ]; then
            echo "::error::SMOKE_URL variable is not set for the ${{ needs.gate.outputs.target-env }} GitHub Environment."
            echo "Configure it in repo Settings → Environments → ${{ needs.gate.outputs.target-env }} → Variables."
            exit 1
          fi
          echo "Testing against $SMOKE_URL"
          node scripts/smoke-prod.mjs

      - name: Post smoke summary
        if: success()
        env:
          ENV: ${{ needs.gate.outputs.target-env }}
          REF: ${{ needs.gate.outputs.deploy-ref }}
          TAG: ${{ needs.gate.outputs.image-tag }}
          RELEASE: ${{ needs.gate.outputs.release-name }}
          NS: ${{ needs.gate.outputs.namespace }}
        run: |
          {
            echo "### ✅ Deploy + Smoke complete"
            echo ""
            echo "- **Environment:** $ENV"
            echo "- **Ref:** \`$REF\` (image tag \`$TAG\`)"
            echo "- **Helm release:** \`$RELEASE\` (namespace \`$NS\`)"
            echo "- **Validated:** livez, readyz, health, login, auth session"
            echo "- **Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          } >> "$GITHUB_STEP_SUMMARY"
