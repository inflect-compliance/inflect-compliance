#
# Production Docker Compose for inflect-compliance.
#
# Runs on a single VM. Caddy terminates TLS (LE via sslip.io) and
# proxies to the Next.js app. Postgres + PgBouncer + Redis + ClamAV
# are internal-only (no host port publishing) so the only public
# listeners are 80/443 on Caddy.
#

services:
  # ── Postgres ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: inflect_compliance
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-roles.sh:/docker-entrypoint-initdb.d/01-init-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inflect_compliance"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── PgBouncer ─────────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: inflect_compliance
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "25"
      MAX_CLIENT_CONN: "200"
      MAX_DB_CONNECTIONS: "50"
      AUTH_TYPE: scram-sha-256
      STATS_PERIOD: "60"
      ADMIN_USERS: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Redis MUST require a password in a production-like deployment.
    # The :? syntax aborts `docker compose up` before the container
    # is created if REDIS_PASSWORD is unset — same fail-fast pattern
    # as DATA_ENCRYPTION_KEY on the app service below.
    # maxmemory-policy is `noeviction` (NOT allkeys-lru): Redis carries
    # BullMQ job state — an eviction policy would silently drop queued
    # jobs under memory pressure. noeviction makes Redis reject writes
    # (OOM) instead. Matches the ElastiCache parameter group. See
    # docs/deployment.md "Redis — per-environment policy".
    command: redis-server --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD is required — set it in .env.* before starting. Redis must not run unauthenticated in a production-like deployment.}" --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    environment:
      # redis-cli reads REDISCLI_AUTH automatically, so the healthcheck
      # authenticates without putting the password on the command line.
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── ClamAV ────────────────────────────────────────────────────
  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    volumes:
      - clamav-defs:/var/lib/clamav
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # ── App (Next.js) — auto-updated by Watchtower ────────────────
  app:
    image: ghcr.io/inflect-compliance/inflect-compliance:latest
    restart: unless-stopped
    pull_policy: always
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env.prod
    environment:
      # GAP-03 — fail-fast at compose-up time if the master encryption
      # key is absent from deploy/.env.prod. The :? syntax aborts the
      # container start before the app process is spawned, so the
      # operator gets a single clear error instead of a crash loop.
      DATA_ENCRYPTION_KEY: "${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required for production. Generate with: openssl rand -base64 48}"
    volumes:
      - app-uploads:/data/uploads
    expose:
      - "3000"
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ── Worker ────────────────────────────────────────────────────
  # The BullMQ worker + scheduler — a SEPARATE process from `app`
  # (same image, ENTRYPOINT overridden). Without it NO scheduled job
  # runs and enqueued jobs pile up in Redis. The command registers
  # the repeatable schedules (idempotent) then daemonises the
  # worker. Watchtower-enabled so it updates in lockstep with `app`.
  # See docs/deployment.md "Background worker".
  worker:
    image: ghcr.io/inflect-compliance/inflect-compliance:latest
    restart: unless-stopped
    pull_policy: always
    entrypoint: ["/bin/sh", "-c"]
    command: ["node dist/scheduler.mjs && node dist/worker.mjs"]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env.prod
    environment:
      DATA_ENCRYPTION_KEY: "${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required for production. Generate with: openssl rand -base64 48}"
    volumes:
      - app-uploads:/data/uploads
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ── Watchtower ────────────────────────────────────────────────
  # Polls GHCR every 60s. Only containers with
  # `com.centurylinklabs.watchtower.enable=true` are watched —
  # Postgres / Redis / Caddy / ClamAV stay pinned.
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # GHCR auth — populated by `docker login ghcr.io` on the host.
      - /root/.docker/config.json:/config.json:ro
    environment:
      # Watchtower 1.7.1 pins the Docker SDK client to an old API
      # that modern docker daemons (29+) refuse. Force a recent one.
      DOCKER_API_VERSION: "1.45"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_POLL_INTERVAL: "60"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_NOTIFICATIONS_LEVEL: "info"
    command: --label-enable --interval 60 --cleanup

  # ── Caddy (TLS + reverse proxy) ───────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  # ── pipelock (MCP mediator — AI agent firewall) ───────────────
  # External "AI agent firewall for MCP security" (Apache-2.0 CORE;
  # github.com/luckyPipewrench/pipelock). Sits in front of the agent
  # → MCP path, inspects each tool call, and emits a mediator-signed
  # Ed25519 "action receipt" per decision. We POST those receipts to
  #   POST /api/t/<slug>/agent-receipts
  # where the app VERIFIES the signature (native Node crypto) against
  # PIPELOCK_PUBLIC_KEY before trusting/linking them to the audit chain.
  #
  # Mode "balanced" = detect + sign (does NOT block tool calls). To
  # enforce blocking later, switch the daemon to "strict" AND set the
  # app's PIPELOCK_STRICT_MODE=1 (default 0). We use ONLY the Apache-2.0
  # CORE receipt format — NOT the Elastic-License-2.0 "fleet" features.
  #
  # Key management (do this ONCE, out of band — see the runbook below):
  #   1. Generate an Ed25519 keypair for the mediator:
  #        openssl genpkey -algorithm ed25519 -out pipelock-signing.key
  #        openssl pkey -in pipelock-signing.key -pubout -out pipelock-signing.pub
  #   2. Give pipelock the PRIVATE key (mounted secret below) — it never
  #      leaves the daemon.
  #   3. Put the PUBLIC key (raw 32-byte, hex or base64) in the app's env
  #      as PIPELOCK_PUBLIC_KEY (deploy/.env.prod). Public half only.
  #
  # NOTE: image tag + exact env/flags depend on the pipelock release in
  # use — pin a digest before enabling. This service is DEFINED here but
  # is NOT auto-updated by Watchtower (no enable label) and should be
  # activated deliberately by an operator.
  pipelock:
    image: ghcr.io/luckypipewrench/pipelock:latest # pin to a digest before enabling
    restart: unless-stopped
    depends_on:
      - app
    env_file:
      - ./.env.prod
    environment:
      PIPELOCK_MODE: "balanced" # detect + sign; switch to "strict" to block
      PIPELOCK_SIGNING_KEY_FILE: "/run/secrets/pipelock-signing.key"
    volumes:
      # PRIVATE signing key — stays with the daemon, never in the app.
      - ./pipelock-signing.key:/run/secrets/pipelock-signing.key:ro
    expose:
      - "8080"

volumes:
  pgdata:
  redisdata:
  clamav-defs:
  app-uploads:
  caddy-data:
  caddy-config:
