# Cross-Framework Mapping Set: OWASP AISVS v1.0 → ISO/IEC 42001:2023
# Data-driven mapping file for the RequirementMapping ingestion pipeline.
#
# Connects AISVS TECHNICAL AI-security controls to the ISO 42001 AI MANAGEMENT
# SYSTEM clauses + Annex A controls, so a tenant's AISVS verification rolls up
# into their AIMS. Every entry is [curated] — Inflect's judgement of conceptual
# alignment, NOT part of either standard. Structural guidance, not a compliance
# guarantee.
#
# Refs use the YAML library ref_ids (AISVS C<ch>.<sec>.<req> → ISO 42001 clause
# / Annex A control). Only nodes present in the libraries are referenced.

urn: urn:inflect:mappingset:aisvs-to-iso-42001
name: "OWASP AISVS v1.0 → ISO/IEC 42001:2023"
description: >
  Cross-framework traceability between OWASP AISVS v1.0 technical controls and
  ISO/IEC 42001:2023 AI management system clauses + Annex A controls. Curated
  alignment, not a compliance guarantee.
version: 1
source_framework_ref: AISVS-1.0
target_framework_ref: ISO42001-2023

mapping_entries:
