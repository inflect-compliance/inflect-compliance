# Cross-Framework Mapping Set: ISO/IEC 42001:2023 → EU AI Act (2024/1689)
# Data-driven mapping file for the RequirementMapping ingestion pipeline.
#
# Connects the ISO 42001 AI MANAGEMENT SYSTEM to EU AI Act regulatory
# OBLIGATIONS, so a tenant running an AIMS sees how it advances their AI Act
# obligations. Every entry is [curated] — Inflect's judgement, NOT part of
# either source. Structural guidance, NOT legal advice (the AI system's risk
# tier is a tenant + counsel decision).
#
# Refs use the YAML library ref_ids (ISO 42001 clause / Annex A → EU AI Act Art.N).

urn: urn:inflect:mappingset:iso-42001-to-eu-ai-act
name: "ISO/IEC 42001:2023 → EU AI Act (2024/1689)"
description: >
  Cross-framework traceability between the ISO/IEC 42001 AI management system
  and EU AI Act obligations. Curated alignment — structural guidance, not legal
  advice.
version: 1
source_framework_ref: ISO42001-2023
target_framework_ref: EU-AI-ACT-2024

mapping_entries:
