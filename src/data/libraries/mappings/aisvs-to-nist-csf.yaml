# Cross-Framework Mapping Set: OWASP AISVS v1.0 → NIST CSF 2.0
# Data-driven mapping file for the RequirementMapping ingestion pipeline.
#
# Maps OWASP AISVS v1.0 AI-security requirements to the NIST Cybersecurity
# Framework 2.0 outcomes a tenant likely already runs. AISVS concentrates in
# the CSF PROTECT (PR) and DETECT (DE) functions, with supply-chain/risk items
# touching IDENTIFY (ID) and incident/recovery items touching RESPOND/RECOVER.
#
# Provenance: every entry is [curated] — these crosswalks are Inflect's own
# judgement of conceptual alignment, NOT part of the OWASP AISVS standard.
# Mappings are structural guidance, not compliance guarantees.
#
# Refs use the YAML library ref_ids: AISVS C<ch>.<sec>.<req> (source) and the
# NIST CSF outcome ids (target). Only targets present in nist-csf-2.0.yaml are
# referenced; the library-importer resolves them by (framework key, code).

urn: urn:inflect:mappingset:aisvs-to-nist-csf
name: "OWASP AISVS v1.0 → NIST CSF 2.0"
description: >
  Cross-framework traceability between OWASP AISVS v1.0 AI-security
  requirements and NIST CSF 2.0 outcomes. Curated alignment, not a compliance
  guarantee.
version: 1
source_framework_ref: AISVS-1.0
target_framework_ref: NIST-CSF-2.0

mapping_entries:
  # ─── IDENTIFY ────────────────────────────────────────────────────
  - source_ref: C1.1.2
    target_ref: ID.AM-01
    strength: INTERSECT
    rationale: "[curated] Maintaining an inventory of training-data sources is an asset-management outcome (ID.AM-01)."
  - source_ref: C3.1.1
    target_ref: ID.AM-01
    strength: INTERSECT
    rationale: "[curated] Inventorying deployed model artifacts extends hardware/software asset management (ID.AM-01)."
  - source_ref: C6.1.1
    target_ref: ID.RA-01
    strength: RELATED
    rationale: "[curated] Scanning third-party models for malicious code is vulnerability/risk identification (ID.RA-01)."
  - source_ref: C11.1.3
    target_ref: ID.RA-01
    strength: RELATED
    rationale: "[curated] Evaluating models against adversarial techniques identifies AI-specific risks (ID.RA-01)."

  # ─── PROTECT ─────────────────────────────────────────────────────
  - source_ref: C1.1.3
    target_ref: PR.DS-01
    strength: INTERSECT
    rationale: "[curated] Protecting training-data integrity in storage/transfer is data security (PR.DS-01)."
  - source_ref: C8.2.1
    target_ref: PR.DS-01
    strength: RELATED
    rationale: "[curated] Masking sensitive fields before vectorization protects data-at-rest confidentiality (PR.DS-01)."
  - source_ref: C5.1.1
    target_ref: PR.AA-01
    strength: INTERSECT
    rationale: "[curated] Step-up authentication for high-risk AI operations is identity & access management (PR.AA-01)."
  - source_ref: C5.2.1
    target_ref: PR.AA-01
    strength: INTERSECT
    rationale: "[curated] Default-deny authorization on AI resources is access enforcement (PR.AA-01)."

  # ─── DETECT ──────────────────────────────────────────────────────
  - source_ref: C12.1.1
    target_ref: DE.CM-01
    strength: INTERSECT
    rationale: "[curated] Logging AI interactions with session context underpins continuous monitoring (DE.CM-01)."
  - source_ref: C12.2.1
    target_ref: DE.CM-01
    strength: INTERSECT
    rationale: "[curated] Detecting jailbreak / prompt-injection attempts is adverse-event monitoring (DE.CM-01)."

  # ─── RESPOND / RECOVER ───────────────────────────────────────────
  - source_ref: C9.6.1
    target_ref: RS.MA-01
    strength: RELATED
    rationale: "[curated] A manual inference kill-switch is an incident-response containment action (RS.MA-01)."
  - source_ref: C3.3.1
    target_ref: RC.RP-01
    strength: RELATED
    rationale: "[curated] Staged rollout with automated rollback is recovery-plan execution (RC.RP-01)."

  # ─── GOVERN ──────────────────────────────────────────────────────
  - source_ref: C9.2.1
    target_ref: GV.RM-01
    strength: RELATED
    rationale: "[curated] Human approval gates for high-impact agent actions reflect a risk-management strategy (GV.RM-01)."
