# Cross-Framework Mapping Set: CIS Controls v8 → NIST CSF 2.0
#
# Standalone mapping-set file for the RequirementMapping ingestion pipeline.
# Source identifiers are CIS Safeguard numbers (factual identifiers only, used
# under CC BY-NC-SA 4.0 — no CIS descriptive text is reproduced here). Target
# identifiers are NIST CSF 2.0 subcategory references. Mappings are structural
# guidance, not guarantees of compliance or equivalence.
urn: urn:inflect:mappingset:cis-v8-to-nist-csf
name: "CIS Controls v8 → NIST CSF 2.0"
