# Cross-Framework Mapping Set: CIS Controls v8 → ISO/IEC 27001:2022
#
# Standalone mapping-set file for the RequirementMapping ingestion pipeline.
# Source identifiers are CIS Safeguard numbers (factual identifiers only, used
# under CC BY-NC-SA 4.0 — no CIS descriptive text is reproduced here). Target
# identifiers are ISO/IEC 27001:2022 Annex A control references. Mappings are
# structural guidance, not guarantees of compliance or equivalence.
urn: urn:inflect:mappingset:cis-v8-to-iso27001
name: "CIS Controls v8 → ISO 27001:2022"
description: >
  Cross-framework traceability mapping from CIS Critical Security Controls v8 safeguards to ISO/IEC 27001:2022 Annex A controls. Covers all IG1 safeguards plus selected IG2 safeguards.
version: 1
source_framework_ref: CIS-CONTROLS-V8
target_framework_ref: ISO27001-2022

