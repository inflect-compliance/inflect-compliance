urn: urn:inflect:library:owasp-aisvs-1.0
locale: en
ref_id: AISVS-1.0
name: OWASP AISVS v1.0
description: >
  The OWASP AI Security Verification Standard (AISVS) v1.0 is a community
  standard of security requirements for AI-enabled systems, spanning training
  data, input validation, model lifecycle, infrastructure, access control,
  supply chain, output safety, embeddings, agentic orchestration, MCP,
  adversarial robustness, and monitoring. Inflect stores the requirement
  index (IDs + levels + paraphrased titles) and links to the canonical text.
copyright: >
  OWASP AI Security Verification Standard (AISVS) v1.0, (c) OWASP Foundation,
  licensed under CC-BY-SA-4.0 (https://creativecommons.org/licenses/by-sa/4.0/).
  Source: https://github.com/OWASP/AISVS (v1.0). Inflect stores a reference
  INDEX (canonical IDs, verification levels, and short paraphrased titles),
  not the verbatim requirement prose; the full requirement text remains at the
  OWASP source linked from each requirement. Attribution to OWASP retained.
version: 1
publication_date: "2025-05-01"
provider: OWASP
packager: inflect
kind: INDUSTRY_STANDARD

