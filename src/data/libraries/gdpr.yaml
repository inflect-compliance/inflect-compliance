# GDPR — Regulation (EU) 2016/679 (General Data Protection Regulation)
#
# GDPR is EU law: article numbers and titles are public and cited verbatim.
# This is a REGULATORY-REFERENCE framework — the articles are mapping TARGETS
# that controls and other frameworks map TO. It is NOT a control catalogue and
# ships without a control-template starter pack (see the framework-completeness
# ratchet's regulatory-reference exemption).

urn: urn:inflect:library:gdpr
locale: en
ref_id: GDPR
name: GDPR (Regulation (EU) 2016/679)
description: >
  General Data Protection Regulation — the EU regulation on the protection of
  natural persons with regard to the processing of personal data and on the free
  movement of such data. Modelled as a regulatory-reference framework: its
  articles are the obligations that ISO 27701 and other controls map to.
copyright: >
  Regulation (EU) 2016/679 is EU law and is in the public domain. Official text:
  https://eur-lex.europa.eu/eli/reg/2016/679/oj
version: 1
publication_date: "2016-04-27"
provider: European Union
packager: inflect
kind: REGULATION

objects:
  framework:
    urn: urn:inflect:framework:gdpr
    ref_id: GDPR
    name: GDPR (Regulation (EU) 2016/679)
    description: EU General Data Protection Regulation — key articles used as cross-framework mapping targets.

    requirement_nodes:
      # ─── Chapter II — Principles ───
      - urn: urn:inflect:req:gdpr:art-5
        ref_id: "Art.5"
        name: Principles relating to processing of personal data
        description: >
          Lawfulness, fairness and transparency; purpose limitation; data
          minimisation; accuracy; storage limitation; integrity and
          confidentiality; and accountability.
        depth: 1
        category: Principles
      - urn: urn:inflect:req:gdpr:art-6
        ref_id: "Art.6"
        name: Lawfulness of processing
        description: Processing is lawful only if at least one legal basis in Article 6(1) applies (e.g. consent, contract, legal obligation, vital/public interest, legitimate interests).
        depth: 1
        category: Principles
      - urn: urn:inflect:req:gdpr:art-7
        ref_id: "Art.7"
        name: Conditions for consent
        description: Where processing relies on consent, the controller must be able to demonstrate consent was given, freely, and be able to allow its withdrawal.
        depth: 1
        category: Principles

      # ─── Chapter III — Rights of the data subject ───
      - urn: urn:inflect:req:gdpr:art-12
        ref_id: "Art.12"
        name: Transparent information, communication and modalities for the exercise of the rights of the data subject
        description: Provide information and act on data-subject requests concisely, transparently, and without undue delay.
        depth: 1
        category: Data Subject Rights
      - urn: urn:inflect:req:gdpr:art-13
        ref_id: "Art.13"
        name: Information to be provided where personal data are collected from the data subject
        description: Privacy information the controller must give when it collects personal data directly from the individual.
        depth: 1
        category: Data Subject Rights
      - urn: urn:inflect:req:gdpr:art-14
        ref_id: "Art.14"
        name: Information to be provided where personal data have not been obtained from the data subject
        description: Privacy information the controller must give when personal data are obtained indirectly.
        depth: 1
        category: Data Subject Rights
      - urn: urn:inflect:req:gdpr:art-15
        ref_id: "Art.15"
        name: Right of access by the data subject
        description: Individuals may obtain confirmation of processing, access to their personal data, and prescribed information.
        depth: 1
        category: Data Subject Rights
      - urn: urn:inflect:req:gdpr:art-16
        ref_id: "Art.16"
        name: Right to rectification
        description: Individuals may obtain rectification of inaccurate personal data and completion of incomplete data.
        depth: 1
        category: Data Subject Rights
      - urn: urn:inflect:req:gdpr:art-17
        ref_id: "Art.17"
        name: Right to erasure ('right to be forgotten')
        description: Individuals may obtain erasure of personal data in the circumstances set out in Article 17.
        depth: 1
        category: Data Subject Rights
      - urn: urn:inflect:req:gdpr:art-18
        ref_id: "Art.18"
        name: Right to restriction of processing
        description: Individuals may obtain restriction of processing in the circumstances set out in Article 18.
        depth: 1
        category: Data Subject Rights
      - urn: urn:inflect:req:gdpr:art-19
        ref_id: "Art.19"
        name: Notification obligation regarding rectification or erasure of personal data or restriction of processing
        description: The controller communicates rectification, erasure or restriction to each recipient of the data.
        depth: 1
        category: Data Subject Rights
      - urn: urn:inflect:req:gdpr:art-20
        ref_id: "Art.20"
        name: Right to data portability
        description: Individuals may receive their personal data in a structured, commonly used, machine-readable format and transmit it to another controller.
        depth: 1
        category: Data Subject Rights
      - urn: urn:inflect:req:gdpr:art-21
        ref_id: "Art.21"
        name: Right to object
        description: Individuals may object to processing based on legitimate/public interest and to direct-marketing processing.
        depth: 1
        category: Data Subject Rights
      - urn: urn:inflect:req:gdpr:art-22
        ref_id: "Art.22"
        name: Automated individual decision-making, including profiling
        description: Individuals have the right not to be subject to solely automated decisions producing legal or similarly significant effects, subject to exceptions.
        depth: 1
        category: Data Subject Rights

      # ─── Chapter IV — Controller and processor ───
      - urn: urn:inflect:req:gdpr:art-25
        ref_id: "Art.25"
        name: Data protection by design and by default
        description: Implement appropriate technical and organisational measures to embed data-protection principles and process only necessary data by default.
        depth: 1
        category: Controller & Processor
      - urn: urn:inflect:req:gdpr:art-28
        ref_id: "Art.28"
        name: Processor
        description: Use only processors providing sufficient guarantees, bound by a contract meeting the requirements of Article 28(3).
        depth: 1
        category: Controller & Processor
      - urn: urn:inflect:req:gdpr:art-30
        ref_id: "Art.30"
        name: Records of processing activities
        description: Controllers and processors maintain records of processing activities under their responsibility.
        depth: 1
        category: Controller & Processor
      - urn: urn:inflect:req:gdpr:art-32
        ref_id: "Art.32"
        name: Security of processing
        description: Implement appropriate technical and organisational measures to ensure a level of security appropriate to the risk.
        depth: 1
        category: Controller & Processor
      - urn: urn:inflect:req:gdpr:art-33
        ref_id: "Art.33"
        name: Notification of a personal data breach to the supervisory authority
        description: Notify the supervisory authority of a personal data breach without undue delay and, where feasible, within 72 hours.
        depth: 1
        category: Controller & Processor
      - urn: urn:inflect:req:gdpr:art-34
        ref_id: "Art.34"
        name: Communication of a personal data breach to the data subject
        description: Communicate a high-risk personal data breach to affected individuals without undue delay.
        depth: 1
        category: Controller & Processor
      - urn: urn:inflect:req:gdpr:art-35
        ref_id: "Art.35"
        name: Data protection impact assessment
        description: Carry out a DPIA where processing is likely to result in a high risk to the rights and freedoms of individuals.
        depth: 1
        category: Controller & Processor

      # ─── Chapter V — Transfers of personal data to third countries ───
      - urn: urn:inflect:req:gdpr:art-44
        ref_id: "Art.44"
        name: General principle for transfers
        description: Any transfer to a third country or international organisation must comply with the conditions of Chapter V.
        depth: 1
        category: International Transfers
      - urn: urn:inflect:req:gdpr:art-45
        ref_id: "Art.45"
        name: Transfers on the basis of an adequacy decision
        description: Transfers may occur where the Commission has decided the third country ensures an adequate level of protection.
        depth: 1
        category: International Transfers
      - urn: urn:inflect:req:gdpr:art-46
        ref_id: "Art.46"
        name: Transfers subject to appropriate safeguards
        description: In the absence of adequacy, transfers require appropriate safeguards (e.g. SCCs, BCRs) with enforceable rights.
        depth: 1
        category: International Transfers
      - urn: urn:inflect:req:gdpr:art-47
        ref_id: "Art.47"
        name: Binding corporate rules
        description: Intra-group transfers may rely on binding corporate rules approved by the competent supervisory authority.
        depth: 1
        category: International Transfers
      - urn: urn:inflect:req:gdpr:art-48
        ref_id: "Art.48"
        name: Transfers or disclosures not authorised by Union law
        description: Third-country authority requests to disclose data are only recognised on the basis of an international agreement.
        depth: 1
        category: International Transfers
      - urn: urn:inflect:req:gdpr:art-49
        ref_id: "Art.49"
        name: Derogations for specific situations
        description: In the absence of adequacy or safeguards, transfers may rely on the specific derogations in Article 49 (e.g. explicit consent, contract necessity).
        depth: 1
        category: International Transfers
