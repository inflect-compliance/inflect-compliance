    name: EU AI Act (2024/1689)
    description: Risk-tiered AI regulation obligations (prohibited / high-risk / limited / GPAI / minimal)
    requirement_nodes:
      # ─── Prohibited AI practices ───
      - urn: urn:inflect:req:eu-ai-act:tier-prohibited
        ref_id: "Tier.Prohibited"
        name: "Prohibited AI practices"
        description: "EU AI Act risk tier: Prohibited AI practices. Applies when a tenant classifies an AI system into this tier. Risk-tier classification of a given AI system is a tenant decision made with legal counsel — Inflect provides the obligation structure, NOT a legal determination. Not legal advice."
        depth: 1
        assessable: false
        category: "Risk tier: Prohibited AI practices"
      - urn: urn:inflect:req:eu-ai-act:art-5
        ref_id: "Art.5"
        name: "Prohibited AI practices"
        description: "Do not place on the market, put into service, or use the AI practices banned by Article 5 (e.g. social scoring, untargeted facial-image scraping, manipulative or exploitative systems, certain biometric categorisation and real-time remote biometric identification)."
        parent_urn: urn:inflect:req:eu-ai-act:tier-prohibited
        depth: 2
        assessable: true
        category: "Risk tier: Prohibited AI practices"
        section: "Prohibited AI practices"
