# EU AI Act — Regulation (EU) 2024/1689 — Framework Library
# EU legislation = PUBLIC DOMAIN: article titles + concise obligation
# summaries are used directly, with article references. Modelled by the
# AI Act RISK TIERS (prohibited / high-risk / limited / GPAI / minimal).
# NOT LEGAL ADVICE — risk-tier classification is a tenant + counsel call.

urn: urn:inflect:library:eu-ai-act
locale: en
ref_id: EU-AI-ACT-2024
name: EU AI Act (2024/1689)
description: >
  Regulation (EU) 2024/1689 laying down harmonised rules on artificial
  intelligence. Obligations are organised by the AI Act risk tiers; which
  tier (and therefore which obligations) applies depends on the tenant's
  classification of each AI system. Risk-tier classification of a given AI system is a tenant decision made with legal counsel — Inflect provides the obligation structure, NOT a legal determination. Not legal advice.
copyright: >
  Regulation (EU) 2024/1689 is EU legislation and is in the public domain.
  Source: https://eur-lex.europa.eu/eli/reg/2024/1689/oj . Obligation
  summaries reference the official articles.
version: 1
publication_date: "2024-06-13"
provider: European Union
packager: inflect
kind: REGULATION

