# OWASP Application Security Verification Standard (ASVS) 4.0.3 — Framework Library
#
# ORIGINAL STRUCTURAL OUTLINE — NOT verbatim ASVS text.
# The OWASP ASVS is published by the OWASP Foundation under the Creative
# Commons Attribution-ShareAlike 4.0 (CC BY-SA 4.0) license. Because the
# ShareAlike term would require relicensing derivative content and is
# incompatible with Inflect Compliance being a proprietary product, this
# file does NOT reproduce ASVS's requirement prose. It uses ONLY the factual
# identifiers (chapters V1-V14 and requirement numbers such as "V2.1.1"), the
# short factual chapter and requirement titles, and the L1/L2/L3 verification-
# level structure. Every "description:" field below is our OWN ORIGINAL
# PARAPHRASE of the intent of the requirement — no ASVS sentences are copied.
# The full, authoritative standard is available from the OWASP Foundation at
# https://owasp.org/www-project-application-security-verification-standard/ .
#
# Verification level is encoded in the "category" field (L1/L2/L3); a
# requirement's level is the LOWEST level at which it applies (L1 requirements
# also apply to L2 and L3, and L2 requirements also apply to L3).

urn: urn:inflect:library:owasp-asvs-4.0.3
locale: en
ref_id: OWASP-ASVS-4.0.3
name: OWASP Application Security Verification Standard 4.0.3
description: >
  The OWASP Application Security Verification Standard (ASVS) 4.0.3 is a catalogue of application security
  requirements organized into 14 chapters and three cumulative verification levels (L1, L2, L3). This library is
  an original structural outline for compliance tracking; requirement descriptions are our own paraphrases and
  no ASVS text is reproduced.
copyright: >
  Structural outline only. OWASP ASVS is (c) the OWASP Foundation and licensed CC BY-SA 4.0. This file reuses
  only the factual identifiers, titles, and L1/L2/L3 structure; all descriptive text is original because the CC
  BY-SA share-alike term is incompatible with embedding the text in a proprietary product. The full standard is
  at https://owasp.org/www-project-application-security-verification-standard/
version: 1
publication_date: "2021-10-01"
provider: OWASP Foundation
packager: inflect
kind: INDUSTRY_STANDARD

objects:
  framework:
    urn: urn:inflect:framework:owasp-asvs-4.0.3
    ref_id: OWASP-ASVS-4.0.3
    name: OWASP Application Security Verification Standard 4.0.3
    description: OWASP ASVS 4.0.3 — 14 chapters of application security requirements across verification levels L1-L3

    requirement_nodes:
      # ─── V1: Architecture, Design and Threat Modeling ───
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        ref_id: "V1"
        name: "Architecture, Design and Threat Modeling"
        description: >
          Requirements addressing architecture, design and threat modeling within the ASVS verification model.
        depth: 1
        assessable: false
        category: "Architecture, Design and Threat Modeling"
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.1.1
        ref_id: "V1.1.1"
        name: "Secure Development Lifecycle"
        description: >
          Confirm that a secure software development lifecycle is used and that it treats security as a first-class
          concern across every stage of the project.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.1.2
        ref_id: "V1.1.2"
        name: "Threat Modeling"
        description: >
          Perform threat modeling for significant design changes so that likely attacks are anticipated and mitigated
          before code ships.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.1.3
        ref_id: "V1.1.3"
        name: "Security in User Stories"
        description: >
          Ensure user stories and features carry the functional security constraints they depend on, such as who may act
          and what limits apply.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.1.4
        ref_id: "V1.1.4"
        name: "Trust Boundaries Documented"
        description: >
          Document the application's trust boundaries, components, and significant data flows so that where controls are
          needed is explicit.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.1.5
        ref_id: "V1.1.5"
        name: "Security Analysis of Components"
        description: >
          Define and analyse the security controls each component and its data flow rely upon, rather than assuming they
          are inherited.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.1.6
        ref_id: "V1.1.6"
        name: "Centralized Security Controls"
        description: >
          Implement security controls in a small number of vetted, reusable components so that protection is consistent
          across the application.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.1.7
        ref_id: "V1.1.7"
        name: "Secure Coding Checklist"
        description: >
          Maintain a secure coding checklist and secure-by-default guidance tailored to the technologies the team
          actually uses.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.2.1
        ref_id: "V1.2.1"
        name: "Low-Privilege Component Accounts"
        description: >
          Run application components under unique, least-privilege operating-system accounts instead of shared or over-
          permissioned identities.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.2.2
        ref_id: "V1.2.2"
        name: "Authenticated Component Communication"
        description: >
          Require components to authenticate to one another so that internal calls cannot be forged by an attacker who
          reaches the network.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.2.3
        ref_id: "V1.2.3"
        name: "Single Vetted Authentication Mechanism"
        description: >
          Use a single, well-tested authentication mechanism that is extensible and free of ad-hoc bypasses.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.2.4
        ref_id: "V1.2.4"
        name: "Uniform Authentication Strength"
        description: >
          Ensure all authentication paths and identity APIs enforce the same strength so no weaker route undermines the
          strong one.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.4.1
        ref_id: "V1.4.1"
        name: "Trusted Enforcement Points"
        description: >
          Enforce access control at trusted service layers rather than relying on checks that a client could remove or
          skip.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.4.4
        ref_id: "V1.4.4"
        name: "Single Access Control Mechanism"
        description: >
          Use one common, tested access-control mechanism across the application to avoid gaps from duplicated or
          divergent logic.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.4.5
        ref_id: "V1.4.5"
        name: "Attribute or Feature Based Access Control"
        description: >
          Prefer attribute- or feature-based access control so permissions reflect real business rules rather than
          brittle role hard-coding.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.5.1
        ref_id: "V1.5.1"
        name: "Input and Output Requirements"
        description: >
          Define input and output handling requirements, including how data is validated and encoded, so expectations
          are explicit for developers.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.5.2
        ref_id: "V1.5.2"
        name: "Safe Serialization"
        description: >
          Avoid deserializing untrusted data, or strongly constrain it, so that serialization does not become a remote-
          code path.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.5.3
        ref_id: "V1.5.3"
        name: "Server-Side Validation"
        description: >
          Treat input validation as an enforced server-side control, never as a convenience that a client can disable.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.5.4
        ref_id: "V1.5.4"
        name: "Context-Aware Output Encoding"
        description: >
          Encode output for the exact interpreter it flows into so that data cannot be misread as executable content.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.6.1
        ref_id: "V1.6.1"
        name: "Cryptographic Key Management"
        description: >
          Define a clear key-management policy covering how cryptographic keys are generated, stored, rotated, and
          retired.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.6.2
        ref_id: "V1.6.2"
        name: "Protection of Key Material"
        description: >
          Protect secret key material with a key vault or equivalent so that keys are never exposed in plain form to
          application code.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.6.3
        ref_id: "V1.6.3"
        name: "Key Rotation Without Redeploy"
        description: >
          Design so that keys and passwords can be replaced or rotated as part of a defined lifecycle without an
          application rebuild.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.6.4
        ref_id: "V1.6.4"
        name: "No Client-Side Secrets"
        description: >
          Keep architectural secrets off the client, since anything delivered to a browser or app can be read by its
          user.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.7.1
        ref_id: "V1.7.1"
        name: "Common Logging Format"
        description: >
          Adopt a common logging format and approach across the application so that events can be correlated and
          analysed reliably.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.7.2
        ref_id: "V1.7.2"
        name: "Central Log Collection"
        description: >
          Transmit logs to a protected central service so that local tampering cannot erase the record of an incident.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.8.1
        ref_id: "V1.8.1"
        name: "Data Classification"
        description: >
          Identify and classify the data the application handles by sensitivity so that protection can be matched to
          risk.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.8.2
        ref_id: "V1.8.2"
        name: "Protection Per Classification"
        description: >
          Define and apply protection requirements for each data classification level, covering encryption, retention,
          and access.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.9.1
        ref_id: "V1.9.1"
        name: "Encrypted Component Links"
        description: >
          Encrypt communication between application components, including any internal service-to-service traffic.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.9.2
        ref_id: "V1.9.2"
        name: "Authenticated Component Links"
        description: >
          Authenticate the endpoints of component-to-component links and verify certificates or keys rather than
          trusting the network.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.10.1
        ref_id: "V1.10.1"
        name: "Source Code Control"
        description: >
          Manage source code and configuration in a version-control system with attributable, reviewed changes.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.11.1
        ref_id: "V1.11.1"
        name: "Business Logic Documentation"
        description: >
          Document the application's business logic and the limits, sequences, and states each workflow must respect.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.11.2
        ref_id: "V1.11.2"
        name: "No Unsafe Shared State"
        description: >
          Avoid unsynchronized shared state in high-value logic so that concurrent requests cannot corrupt a workflow.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.11.3
        ref_id: "V1.11.3"
        name: "Thread-Safe High-Value Logic"
        description: >
          Make high-value business logic explicitly thread-safe and resistant to time-of-check to time-of-use race
          conditions.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L3
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.12.1
        ref_id: "V1.12.1"
        name: "Safe File Upload Storage"
        description: >
          Store uploaded files outside the web root or on a separate host, and serve them so they cannot be executed.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.14.1
        ref_id: "V1.14.1"
        name: "Component Segregation"
        description: >
          Segregate components of differing trust using sandboxing, containers, or network controls to limit blast
          radius.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.14.2
        ref_id: "V1.14.2"
        name: "Signed Build Artifacts"
        description: >
          Distribute binaries and updates using signatures over trusted channels so tampered artifacts are detected.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.14.3
        ref_id: "V1.14.3"
        name: "Build Pipeline Warnings"
        description: >
          Configure the build pipeline to surface out-of-date or insecure components and to warn on deprecated
          dependencies.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.14.4
        ref_id: "V1.14.4"
        name: "Automated Deployment"
        description: >
          Automate build and deployment so that releases are repeatable and free of manual, error-prone steps.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.14.5
        ref_id: "V1.14.5"
        name: "Application Sandboxing"
        description: >
          Deploy the application inside network segmentation and sandboxing appropriate to its exposure and sensitivity.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V1.14.6
        ref_id: "V1.14.6"
        name: "No Unsupported Client Technologies"
        description: >
          Avoid unsupported or insecure client-side technologies such as legacy plugins that expand the attack surface.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V1
        depth: 2
        assessable: true
        category: L2
      # ─── V2: Authentication ───
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        ref_id: "V2"
        name: "Authentication"
        description: >
          Requirements addressing authentication within the ASVS verification model.
        depth: 1
        assessable: false
        category: "Authentication"
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.1.1
        ref_id: "V2.1.1"
        name: "Minimum Password Length"
        description: >
          Require passwords of at least twelve characters so that short, easily guessed secrets are rejected.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.1.2
        ref_id: "V2.1.2"
        name: "Long Passwords Permitted"
        description: >
          Permit long passwords of at least sixty-four characters so users can choose strong passphrases.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.1.3
        ref_id: "V2.1.3"
        name: "No Silent Truncation"
        description: >
          Do not silently truncate passwords; accept the full secret the user typed or reject it clearly.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.1.4
        ref_id: "V2.1.4"
        name: "Unicode and Spaces Allowed"
        description: >
          Allow spaces and printable Unicode, including emoji, within passwords without stripping meaningful characters.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.1.5
        ref_id: "V2.1.5"
        name: "Users Can Change Password"
        description: >
          Let authenticated users change their password through a supported, self-service flow.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.1.6
        ref_id: "V2.1.6"
        name: "Change Requires Current Password"
        description: >
          Require the current password when changing to a new one so a hijacked session cannot lock out the owner.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.1.7
        ref_id: "V2.1.7"
        name: "Breached Password Screening"
        description: >
          Check chosen passwords against a set of known-breached values and refuse those that appear in it.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.1.8
        ref_id: "V2.1.8"
        name: "Password Strength Guidance"
        description: >
          Provide a strength meter or guidance to help users choose stronger passwords.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.1.9
        ref_id: "V2.1.9"
        name: "No Arbitrary Composition Rules"
        description: >
          Do not impose composition rules such as mandatory symbol mixes that push users toward predictable patterns.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.1.10
        ref_id: "V2.1.10"
        name: "No Forced Periodic Rotation"
        description: >
          Do not force periodic password rotation in the absence of evidence of compromise.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.1.11
        ref_id: "V2.1.11"
        name: "Password Managers Supported"
        description: >
          Allow pasting and browser or password-manager autofill so that strong, unique secrets are practical.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.1.12
        ref_id: "V2.1.12"
        name: "Reveal or Show Last Character"
        description: >
          Offer an option to view the entered password or its last character to reduce entry errors.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.2.1
        ref_id: "V2.2.1"
        name: "Anti-Automation on Login"
        description: >
          Apply anti-automation controls such as rate limiting and lockout so that credential guessing is impractical.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.2.2
        ref_id: "V2.2.2"
        name: "Restrict Weak Authenticators"
        description: >
          Limit weak authenticators such as SMS and favour stronger factors, offering users at least one strong option.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.2.3
        ref_id: "V2.2.3"
        name: "Secure Authentication Notifications"
        description: >
          Notify users through a secure channel after significant authentication events such as password or factor
          changes.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.2.4
        ref_id: "V2.2.4"
        name: "Impersonation Resistance"
        description: >
          Provide impersonation resistance against phishing, for example with hardware-backed or verifier-bound
          authenticators.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L3
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.2.5
        ref_id: "V2.2.5"
        name: "Verifier Compromise Resistance"
        description: >
          Ensure a compromise of the verifier does not let an attacker recover usable authentication secrets.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L3
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.2.6
        ref_id: "V2.2.6"
        name: "Replay Resistance"
        description: >
          Use replay-resistant mechanisms such as one-time or challenge-based authenticators for high-assurance flows.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L3
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.2.7
        ref_id: "V2.2.7"
        name: "Intent to Authenticate"
        description: >
          Require a deliberate user action to authenticate so that presence and intent are demonstrated.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L3
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.3.1
        ref_id: "V2.3.1"
        name: "Random Initial Secrets"
        description: >
          Generate initial or temporary passwords with sufficient randomness and expire them after first use.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.3.2
        ref_id: "V2.3.2"
        name: "Enrollment and Renewal"
        description: >
          Support secure enrollment and renewal of hardware and software authenticators through a defined process.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.3.3
        ref_id: "V2.3.3"
        name: "Renewal Instructions and Timing"
        description: >
          Deliver renewal instructions in good time before an authenticator expires so access is not disrupted.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.4.1
        ref_id: "V2.4.1"
        name: "Salted Password Hashing"
        description: >
          Store passwords using a strong, salted, purpose-built password hashing function rather than a fast digest.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.4.2
        ref_id: "V2.4.2"
        name: "Unique Salt Per Credential"
        description: >
          Use a unique salt for each stored credential so that identical passwords do not share a hash.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.4.3
        ref_id: "V2.4.3"
        name: "Adequate Work Factor"
        description: >
          Configure the password hash with a work factor high enough to make offline cracking costly.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.4.4
        ref_id: "V2.4.4"
        name: "Approved Hashing Algorithm"
        description: >
          Choose an approved password-hashing algorithm such as argon2, scrypt, bcrypt, or PBKDF2 with sound parameters.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.4.5
        ref_id: "V2.4.5"
        name: "Additional Pepper or Iteration"
        description: >
          Apply an additional secret pepper or extra iteration for the most sensitive stored credentials.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L3
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.5.1
        ref_id: "V2.5.1"
        name: "No Vendor Default Recovery Secret"
        description: >
          Do not ship default or shared recovery secrets that would grant access out of the box.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.5.2
        ref_id: "V2.5.2"
        name: "No Password Hints"
        description: >
          Do not store or expose password hints or knowledge-based answers that ease guessing.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.5.3
        ref_id: "V2.5.3"
        name: "Recovery Does Not Reveal Password"
        description: >
          Ensure account recovery never discloses the current password to the requester.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.5.4
        ref_id: "V2.5.4"
        name: "No Shared or Default Accounts"
        description: >
          Avoid shared or built-in default accounts such as generic administrator logins.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.5.5
        ref_id: "V2.5.5"
        name: "Notify on Factor Change"
        description: >
          Notify the user when an authentication factor is added, changed, or removed.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.5.6
        ref_id: "V2.5.6"
        name: "Secure Recovery Mechanism"
        description: >
          Provide a secure recovery mechanism that does not rely on an insecure channel or weak secret.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.5.7
        ref_id: "V2.5.7"
        name: "Recovery for Lost MFA"
        description: >
          Offer a secure way to recover or replace a lost multi-factor authenticator without weakening assurance.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.6.1
        ref_id: "V2.6.1"
        name: "One-Time Lookup Secrets"
        description: >
          Ensure lookup or backup codes can each be used only once.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.6.2
        ref_id: "V2.6.2"
        name: "Random Lookup Secrets"
        description: >
          Generate lookup secrets with sufficient entropy from a secure random source.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.6.3
        ref_id: "V2.6.3"
        name: "Hashed Lookup Secrets"
        description: >
          Store lookup secrets in hashed form so a database leak does not expose usable codes.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.7.1
        ref_id: "V2.7.1"
        name: "No Cleartext Out-of-Band"
        description: >
          Do not use unencrypted out-of-band mechanisms as a primary factor for sensitive accounts.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.7.2
        ref_id: "V2.7.2"
        name: "Out-of-Band Expiry"
        description: >
          Expire out-of-band verification codes after a short validity window.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.7.3
        ref_id: "V2.7.3"
        name: "Single-Use Out-of-Band"
        description: >
          Ensure an out-of-band code can only be consumed once.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.7.4
        ref_id: "V2.7.4"
        name: "Authenticated Out-of-Band Delivery"
        description: >
          Deliver out-of-band codes only over a channel bound to the correct user.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.8.1
        ref_id: "V2.8.1"
        name: "Time-Based One-Time Passwords"
        description: >
          Support time-based one-time password authenticators as a recognised second factor.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.8.2
        ref_id: "V2.8.2"
        name: "Protected OTP Secrets"
        description: >
          Protect stored one-time-password seed secrets so a database leak cannot reproduce codes.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.8.4
        ref_id: "V2.8.4"
        name: "Single-Use OTP Within Window"
        description: >
          Reject reuse of a one-time password within its validity window.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.9.1
        ref_id: "V2.9.1"
        name: "Secure Cryptographic Key Storage"
        description: >
          Store cryptographic authenticator keys in protected storage resistant to extraction.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.9.2
        ref_id: "V2.9.2"
        name: "Challenge Nonce Quality"
        description: >
          Use unpredictable, sufficiently long challenge nonces in cryptographic authentication.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.9.3
        ref_id: "V2.9.3"
        name: "Approved Cryptographic Authentication"
        description: >
          Rely on approved cryptographic algorithms for authenticator verification.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.10.1
        ref_id: "V2.10.1"
        name: "Non-Default Service Secrets"
        description: >
          Ensure inter-service authentication secrets are not defaults and are unique per deployment.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.10.2
        ref_id: "V2.10.2"
        name: "Protected Service Credentials"
        description: >
          Protect stored service credentials so they are not readable in application source or config.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V2.10.4
        ref_id: "V2.10.4"
        name: "Secrets in a Vault"
        description: >
          Store service and integration secrets in a managed secrets vault rather than in code or images.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V2
        depth: 2
        assessable: true
        category: L2
      # ─── V3: Session Management ───
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        ref_id: "V3"
        name: "Session Management"
        description: >
          Requirements addressing session management within the ASVS verification model.
        depth: 1
        assessable: false
        category: "Session Management"
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.1.1
        ref_id: "V3.1.1"
        name: "No Session Tokens in URLs"
        description: >
          Never place session tokens in URLs where they can leak through logs, history, or referrers.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.2.1
        ref_id: "V3.2.1"
        name: "New Token After Authentication"
        description: >
          Issue a fresh session token upon authentication to prevent fixation of a pre-login value.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.2.2
        ref_id: "V3.2.2"
        name: "Sufficient Token Entropy"
        description: >
          Generate session tokens with enough entropy that they cannot be guessed or enumerated.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.2.3
        ref_id: "V3.2.3"
        name: "Secure Token Storage"
        description: >
          Store session tokens in the client using secure, tamper-resistant cookie mechanisms.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.2.4
        ref_id: "V3.2.4"
        name: "Approved Token Generation"
        description: >
          Generate session tokens using approved cryptographic random functions.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.3.1
        ref_id: "V3.3.1"
        name: "Logout Invalidates Session"
        description: >
          Fully invalidate the session server-side on logout so the token cannot be reused.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.3.2
        ref_id: "V3.3.2"
        name: "Inactivity and Absolute Timeout"
        description: >
          Expire sessions after a period of inactivity and enforce a reasonable absolute lifetime.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.3.3
        ref_id: "V3.3.3"
        name: "Terminate Sessions on Credential Change"
        description: >
          Terminate a user's other active sessions when their password or factors change.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.3.4
        ref_id: "V3.3.4"
        name: "Manage Active Sessions"
        description: >
          Let users view and revoke their active sessions and devices.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.4.1
        ref_id: "V3.4.1"
        name: "Secure Cookie Attribute"
        description: >
          Set the Secure attribute on session cookies so they are sent only over encrypted connections.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.4.2
        ref_id: "V3.4.2"
        name: "HttpOnly Cookie Attribute"
        description: >
          Set the HttpOnly attribute so session cookies are not readable from client scripts.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.4.3
        ref_id: "V3.4.3"
        name: "SameSite Cookie Attribute"
        description: >
          Set an appropriate SameSite attribute to reduce cross-site request risk.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.4.4
        ref_id: "V3.4.4"
        name: "Host-Prefixed Cookies"
        description: >
          Use the __Host- cookie prefix where possible to constrain scope and origin.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.4.5
        ref_id: "V3.4.5"
        name: "Path-Scoped Cookies"
        description: >
          Scope session cookies to the narrowest path the application needs.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.5.1
        ref_id: "V3.5.1"
        name: "Revocable Token Sessions"
        description: >
          Allow token-based sessions to be revoked so a stolen token can be invalidated.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.5.2
        ref_id: "V3.5.2"
        name: "No Static API Secrets as Sessions"
        description: >
          Do not treat static, long-lived API keys as user sessions.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.5.3
        ref_id: "V3.5.3"
        name: "Stateless Token Validation"
        description: >
          Validate stateless tokens using approved signatures and reject tampered or expired values.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L2
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V3.7.1
        ref_id: "V3.7.1"
        name: "Reauthentication for Sensitive Actions"
        description: >
          Require reauthentication or a fresh confirmation before especially sensitive operations.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V3
        depth: 2
        assessable: true
        category: L2
      # ─── V4: Access Control ───
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V4
        ref_id: "V4"
        name: "Access Control"
        description: >
          Requirements addressing access control within the ASVS verification model.
        depth: 1
        assessable: false
        category: "Access Control"
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V4.1.1
        ref_id: "V4.1.1"
        name: "Server-Side Access Enforcement"
        description: >
          Enforce access control on a trusted server layer, never solely in client-side code.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V4
        depth: 2
        assessable: true
        category: L1
      - urn: urn:inflect:req:owasp-asvs-4.0.3:V4.1.2
        ref_id: "V4.1.2"
        name: "Non-Manipulable Access Metadata"
        description: >
          Ensure the attributes used for access decisions cannot be tampered with by the requester.
        parent_urn: urn:inflect:req:owasp-asvs-4.0.3:V4
