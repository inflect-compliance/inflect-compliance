# NIST Privacy Framework v1.0 — Framework Library
# Based on the public NIST Privacy Framework: A Tool for Improving Privacy
# through Enterprise Risk Management, Version 1.0 (NIST, 2020-01-16).
# The Privacy Framework is the direct companion to the NIST Cybersecurity
# Framework (CSF) 2.0 — same Function / Category / Subcategory structure — so
# this file mirrors nist-csf-2.0.yaml exactly. Descriptions are paraphrased
# from the publicly available NIST documentation.

urn: urn:inflect:library:nist-privacy-framework-1.0
locale: en
ref_id: NIST-PF-1.0
name: NIST Privacy Framework v1.0
description: >
  The NIST Privacy Framework provides a taxonomy of privacy outcomes
  (Functions, Categories, and Subcategories) that any organization can use to
  identify and manage privacy risk arising from data processing, build
  privacy into products and services, and communicate about privacy practices.
  It is the privacy companion to the NIST Cybersecurity Framework.
copyright: >
  Information presented on NIST sites is considered public information
  and may be distributed or copied.
version: 1
publication_date: "2020-01-16"
provider: NIST
packager: inflect
kind: NIST_FRAMEWORK

objects:
  framework:
    urn: urn:inflect:framework:nist-privacy-framework-1.0
    ref_id: NIST-PF-1.0
    name: NIST Privacy Framework v1.0
    description: NIST Privacy Framework version 1.0 (privacy companion to NIST CSF)
    min_score: 1
    max_score: 4
    scores_definition:
      - score: 1
        name: Partial
        description: >
          Organizational privacy risk management is ad hoc, with limited
          awareness of privacy risk at the organizational level.
      - score: 2
        name: Risk Informed
        description: >
          Privacy risk management practices are approved by management but may
          not be established as organization-wide policy.
      - score: 3
        name: Repeatable
        description: >
          Privacy risk management practices are formally approved and expressed
          as policy and are regularly updated based on changes in business
          requirements and the data processing environment.
      - score: 4
        name: Adaptive
        description: >
          The organization adapts its privacy practices based on lessons
          learned and predictive indicators derived from previous and current
          privacy activities.

    requirement_nodes:
      # ─── IDENTIFY-P (ID-P) ──────────────────────────────────────────
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p
        ref_id: ID-P
        name: IDENTIFY-P
        description: >
          Develop the organizational understanding to manage privacy risk for
          individuals arising from data processing.
        depth: 1
        assessable: false
        category: Identify

      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im
        ref_id: ID.IM-P
        name: Inventory and Mapping
        description: >
          Data processing by systems, products, or services is understood and
          informs the management of privacy risk.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p
        depth: 2
        assessable: false
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im-p1
        ref_id: ID.IM-P1
        description: Systems, products, and services that process data are inventoried.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im-p2
        ref_id: ID.IM-P2
        description: Owners or operators and roles for data processing are inventoried.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im-p3
        ref_id: ID.IM-P3
        description: Categories of individuals whose data are processed are inventoried.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im-p4
        ref_id: ID.IM-P4
        description: >
          Data actions of the systems, products, and services are inventoried.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im-p5
        ref_id: ID.IM-P5
        description: The purposes for the data actions are inventoried.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im-p6
        ref_id: ID.IM-P6
        description: >
          Data elements within the data actions are inventoried.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im-p7
        ref_id: ID.IM-P7
        description: >
          The data processing environment is identified (e.g., geographic
          location, internal, cloud, third parties).
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im-p8
        ref_id: ID.IM-P8
        description: >
          Data processing is mapped, illustrating the data actions and
          associated data elements for systems, products, and services.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.im
        depth: 3
        assessable: true
        category: Identify

      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.be
        ref_id: ID.BE-P
        name: Business Environment
        description: >
          The organization's mission, objectives, stakeholders, and activities
          are understood and prioritized to inform privacy roles,
          responsibilities, and risk management decisions.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p
        depth: 2
        assessable: false
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.be-p1
        ref_id: ID.BE-P1
        description: The organization's role(s) in the data processing ecosystem are identified and communicated.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.be
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.be-p2
        ref_id: ID.BE-P2
        description: Priorities for organizational mission, objectives, and activities are established and communicated.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.be
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.be-p3
        ref_id: ID.BE-P3
        description: Systems/products/services that support organizational priorities are identified and key requirements communicated.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.be
        depth: 3
        assessable: true
        category: Identify

      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.ra
        ref_id: ID.RA-P
        name: Risk Assessment
        description: >
          The organization understands the privacy risk to individuals and how
          such risk may create follow-on impacts on organizational operations.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p
        depth: 2
        assessable: false
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.ra-p1
        ref_id: ID.RA-P1
        description: Contextual factors related to the systems/products/services and the data actions are identified (e.g., individuals' demographics, visibility into processing, data sensitivity).
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.ra
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.ra-p2
        ref_id: ID.RA-P2
        description: Data analytic inputs and outputs are identified and evaluated for bias.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.ra
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.ra-p3
        ref_id: ID.RA-P3
        description: Potential problematic data actions and associated problems for individuals are identified.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.ra
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.ra-p4
        ref_id: ID.RA-P4
        description: Problematic data actions, likelihoods, and impacts are used to determine and prioritize privacy risk.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.ra
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.ra-p5
        ref_id: ID.RA-P5
        description: Risk responses are identified, prioritized, and implemented.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.ra
        depth: 3
        assessable: true
        category: Identify

      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.de
        ref_id: ID.DE-P
        name: Data Processing Ecosystem Risk Management
        description: >
          The organization's priorities, constraints, risk tolerance, and
          assumptions are established and used to support risk decisions
          associated with managing privacy risk in the data processing ecosystem.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p
        depth: 2
        assessable: false
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.de-p1
        ref_id: ID.DE-P1
        description: Data processing ecosystem risk management policies, processes, and procedures are identified, established, assessed, managed, and agreed to by stakeholders.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.de
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.de-p2
        ref_id: ID.DE-P2
        description: Data processing ecosystem parties (e.g., service providers, customers, partners, product/service developers) are identified, prioritized, and assessed using a privacy risk assessment process.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.de
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.de-p3
        ref_id: ID.DE-P3
        description: Contracts with ecosystem parties are used to implement appropriate measures designed to meet the objectives of the organization's privacy program.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.de
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.de-p4
        ref_id: ID.DE-P4
        description: Interoperability frameworks or similar multi-party approaches are used to manage data processing ecosystem privacy risks.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.de
        depth: 3
        assessable: true
        category: Identify
      - urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.de-p5
        ref_id: ID.DE-P5
        description: Ecosystem parties are routinely assessed using audits, test results, or other evaluations to confirm they are meeting their contractual, interoperability-framework, and other obligations.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:id-p.de
        depth: 3
        assessable: true
        category: Identify

      # ─── GOVERN-P (GV-P) ────────────────────────────────────────────
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p
        ref_id: GV-P
        name: GOVERN-P
        description: >
          Develop and implement the organizational governance structure to
          enable an ongoing understanding of the organization's risk management
          priorities that are informed by privacy risk.
        depth: 1
        assessable: false
        category: Govern

      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.po
        ref_id: GV.PO-P
        name: Governance Policies, Processes, and Procedures
        description: >
          The policies, processes, and procedures to manage and monitor the
          organization's regulatory, legal, risk, environmental, and operational
          requirements are understood and inform the management of privacy risk.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p
        depth: 2
        assessable: false
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.po-p1
        ref_id: GV.PO-P1
        description: Organizational privacy values and policies (e.g., conditions on data processing such as data uses or retention periods, individuals' prerogatives with respect to data processing) are established and communicated.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.po
        depth: 3
        assessable: true
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.po-p2
        ref_id: GV.PO-P2
        description: Processes to instill organizational privacy values within system/product/service development and operations are established and in place.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.po
        depth: 3
        assessable: true
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.po-p3
        ref_id: GV.PO-P3
        description: Roles and responsibilities for the workforce are established with respect to privacy.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.po
        depth: 3
        assessable: true
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.po-p4
        ref_id: GV.PO-P4
        description: Privacy roles and responsibilities are coordinated and aligned with third-party stakeholders (e.g., service providers, customers, partners).
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.po
        depth: 3
        assessable: true
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.po-p5
        ref_id: GV.PO-P5
        description: Legal, regulatory, and contractual requirements regarding privacy are understood and managed.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.po
        depth: 3
        assessable: true
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.po-p6
        ref_id: GV.PO-P6
        description: Governance and risk management policies, processes, and procedures address privacy risks.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.po
        depth: 3
        assessable: true
        category: Govern

      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.rm
        ref_id: GV.RM-P
        name: Risk Management Strategy
        description: >
          The organization's priorities, constraints, risk tolerances, and
          assumptions are established and used to support operational risk
          decisions.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p
        depth: 2
        assessable: false
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.rm-p1
        ref_id: GV.RM-P1
        description: Risk management processes are established, managed, and agreed to by organizational stakeholders.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.rm
        depth: 3
        assessable: true
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.rm-p2
        ref_id: GV.RM-P2
        description: Organizational risk tolerance is determined and clearly expressed.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.rm
        depth: 3
        assessable: true
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.rm-p3
        ref_id: GV.RM-P3
        description: The organization's determination of risk tolerance is informed by its role in the data processing ecosystem.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.rm
        depth: 3
        assessable: true
        category: Govern

      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.at
        ref_id: GV.AT-P
        name: Awareness and Training
        description: >
          The organization's workforce and third parties engaged in data
          processing are provided privacy awareness education and are trained to
          perform their privacy-related duties consistent with related policies,
          processes, procedures, and agreements.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p
        depth: 2
        assessable: false
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.at-p1
        ref_id: GV.AT-P1
        description: The workforce is informed and trained on its roles and responsibilities.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.at
        depth: 3
        assessable: true
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.at-p2
        ref_id: GV.AT-P2
        description: Senior executives understand their roles and responsibilities.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.at
        depth: 3
        assessable: true
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.at-p3
        ref_id: GV.AT-P3
        description: Privacy personnel understand their roles and responsibilities.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.at
        depth: 3
        assessable: true
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.at-p4
        ref_id: GV.AT-P4
        description: Third parties (e.g., service providers, customers, partners) understand their roles and responsibilities.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.at
        depth: 3
        assessable: true
        category: Govern

      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.mt
        ref_id: GV.MT-P
        name: Monitoring and Review
        description: >
          The policies, processes, and procedures for ongoing review of the
          organization's privacy posture are understood and inform the
          management of privacy risk.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p
        depth: 2
        assessable: false
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.mt-p1
        ref_id: GV.MT-P1
        description: Privacy risk is re-evaluated on an ongoing basis and as key factors, including the organization's business environment and data processing, change.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.mt
        depth: 3
        assessable: true
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.mt-p2
        ref_id: GV.MT-P2
        description: Privacy values, policies, and training are reviewed and any updates are communicated.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.mt
        depth: 3
        assessable: true
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.mt-p3
        ref_id: GV.MT-P3
        description: Policies, processes, and procedures for assessing compliance with legal requirements and privacy policies are established and in place.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.mt
        depth: 3
        assessable: true
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.mt-p4
        ref_id: GV.MT-P4
        description: Policies, processes, and procedures for communicating progress on managing privacy risks are established and in place.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.mt
        depth: 3
        assessable: true
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.mt-p5
        ref_id: GV.MT-P5
        description: Policies, processes, and procedures are established and in place to receive, analyze, and respond to problematic data actions disclosed to the organization from internal and external sources (e.g., internal discovery, researchers, individuals).
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.mt
        depth: 3
        assessable: true
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.mt-p6
        ref_id: GV.MT-P6
        description: Policies, processes, and procedures incorporate lessons learned from problematic data actions.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.mt
        depth: 3
        assessable: true
        category: Govern
      - urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.mt-p7
        ref_id: GV.MT-P7
        description: Policies, processes, and procedures for receiving, tracking, and responding to complaints, concerns, and questions from individuals about organizational privacy practices are established and in place.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:gv-p.mt
        depth: 3
        assessable: true
        category: Govern

      # ─── CONTROL-P (CT-P) ───────────────────────────────────────────
      - urn: urn:inflect:req:nist-privacy-framework-1.0:ct-p
        ref_id: CT-P
        name: CONTROL-P
        description: >
          Develop and implement appropriate activities to enable organizations
          or individuals to manage data with sufficient granularity to manage
          privacy risks.
        depth: 1
        assessable: false
        category: Control

      - urn: urn:inflect:req:nist-privacy-framework-1.0:ct-p.po
        ref_id: CT.PO-P
        name: Data Processing Policies, Processes, and Procedures
        description: >
          Policies, processes, and procedures are maintained and used to manage
          data processing (e.g., purpose, scope, roles and responsibilities in
          the data processing ecosystem, and management commitment) consistent
          with the organization's risk strategy to protect individuals' privacy.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:ct-p
        depth: 2
        assessable: false
        category: Control
      - urn: urn:inflect:req:nist-privacy-framework-1.0:ct-p.po-p1
        ref_id: CT.PO-P1
        description: Policies, processes, and procedures for authorizing data processing (e.g., organizational decisions, individual consent), revoking authorizations, and maintaining authorizations are established and in place.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:ct-p.po
        depth: 3
        assessable: true
        category: Control
      - urn: urn:inflect:req:nist-privacy-framework-1.0:ct-p.po-p2
        ref_id: CT.PO-P2
        description: Policies, processes, and procedures for enabling data review, transfer, sharing or disclosure, alteration, and deletion are established and in place (e.g., to maintain data quality, manage data retention).
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:ct-p.po
        depth: 3
        assessable: true
        category: Control
      - urn: urn:inflect:req:nist-privacy-framework-1.0:ct-p.po-p3
        ref_id: CT.PO-P3
        description: Policies, processes, and procedures for enabling individuals' data processing preferences and requests are established and in place.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:ct-p.po
        depth: 3
        assessable: true
        category: Control
      - urn: urn:inflect:req:nist-privacy-framework-1.0:ct-p.po-p4
        ref_id: CT.PO-P4
        description: A data life cycle to manage data is aligned and implemented with the system development life cycle to manage systems.
        parent_urn: urn:inflect:req:nist-privacy-framework-1.0:ct-p.po
        depth: 3
        assessable: true
        category: Control

      - urn: urn:inflect:req:nist-privacy-framework-1.0:ct-p.dm
        ref_id: CT.DM-P
        name: Data Processing Management
        description: >
