# this file does NOT reproduce CIS's descriptive prose. It uses ONLY the
# factual identifiers (Control numbers 1-18 and Safeguard numbers such as
# "1.1"), the short factual Safeguard titles, the IG1/IG2/IG3 Implementation
# Group structure, and the overall taxonomy. Every "description:" field below
# is our OWN ORIGINAL PARAPHRASE of the intent of the safeguard — no CIS
# sentences are copied. The full, authoritative CIS Controls (with the
# official guidance text) are available from the Center for Internet Security
# at https://www.cisecurity.org/controls .
#
# Implementation Group is encoded in the "category" field (IG1/IG2/IG3); a
# safeguard's IG is the LOWEST group it belongs to (IG1 safeguards also apply
# to IG2 and IG3, and so on).

urn: urn:inflect:library:cis-controls-v8
locale: en
ref_id: CIS-CONTROLS-V8
name: CIS Critical Security Controls v8
description: >
  The CIS Critical Security Controls v8 are a prioritized set of safeguards to
  mitigate the most common cyber attacks. They are organized into 18 controls
  containing 153 safeguards, and grouped into three Implementation Groups
  (IG1, IG2, IG3) that scale defensive expectations to an enterprise's
  resources and risk. This library is an original structural outline for
  compliance tracking; safeguard descriptions are our own paraphrases.
copyright: >
  Structural outline only. CIS Controls v8 are (c) Center for Internet
  Security and licensed CC BY-NC-SA 4.0. This file reuses only the factual
  identifiers, titles, and IG structure; all descriptive text is original.
  The full CIS Controls are available at https://www.cisecurity.org/controls
version: 1
publication_date: "2021-05-18"
provider: Center for Internet Security
packager: inflect
kind: INDUSTRY_STANDARD

objects:
  framework:
    urn: urn:inflect:framework:cis-controls-v8
    ref_id: CIS-CONTROLS-V8
    name: CIS Critical Security Controls v8
    description: CIS Critical Security Controls v8 — 18 controls, 153 safeguards, Implementation Groups IG1-IG3

    requirement_nodes:
      # ─── Control 1: Inventory and Control of Enterprise Assets ───
      - urn: urn:inflect:req:cis-controls-v8:1
        ref_id: "1"
        name: Inventory and Control of Enterprise Assets
        description: >
          Actively account for every device connected to the enterprise environment so that only authorized assets receive access and rogue equipment is spotted quickly.
        depth: 1
        assessable: false
        category: Inventory and Control of Enterprise Assets
      - urn: urn:inflect:req:cis-controls-v8:1.1
        ref_id: "1.1"
        name: "Establish and Maintain Detailed Enterprise Asset Inventory"
        description: >
          Keep an accurate, regularly refreshed record of every enterprise asset with enough detail to identify and locate it.
        parent_urn: urn:inflect:req:cis-controls-v8:1
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:1.2
        ref_id: "1.2"
        name: "Address Unauthorized Assets"
        description: >
          Define and follow a process to investigate and handle any asset discovered on the network that is not on the approved inventory.
        parent_urn: urn:inflect:req:cis-controls-v8:1
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:1.3
        ref_id: "1.3"
        name: "Utilize an Active Discovery Tool"
        description: >
          Use tooling that actively probes the network to detect connected assets and keep the inventory current.
        parent_urn: urn:inflect:req:cis-controls-v8:1
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:1.4
        ref_id: "1.4"
        name: "Use Dynamic Host Configuration Protocol (DHCP) Logging to Update Enterprise Asset Inventory"
        description: >
          Draw on DHCP server logs to help populate and reconcile the enterprise asset inventory.
        parent_urn: urn:inflect:req:cis-controls-v8:1
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:1.5
        ref_id: "1.5"
        name: "Use a Passive Asset Discovery Tool"
        description: >
          Deploy passive monitoring that identifies assets from observed network traffic without active scanning.
        parent_urn: urn:inflect:req:cis-controls-v8:1
        depth: 2
        assessable: true
        category: IG3
      # ─── Control 2: Inventory and Control of Software Assets ───
      - urn: urn:inflect:req:cis-controls-v8:2
        ref_id: "2"
        name: Inventory and Control of Software Assets
        description: >
          Keep a governed record of all software running in the enterprise so unauthorized or unsupported programs can be found and removed.
        depth: 1
        assessable: false
        category: Inventory and Control of Software Assets
      - urn: urn:inflect:req:cis-controls-v8:2.1
        ref_id: "2.1"
        name: "Establish and Maintain a Software Inventory"
        description: >
          Maintain a current, detailed list of all software titles authorized to run on enterprise assets.
        parent_urn: urn:inflect:req:cis-controls-v8:2
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:2.2
        ref_id: "2.2"
        name: "Ensure Authorized Software is Currently Supported"
        description: >
          Confirm that software in use is still supported by its vendor and remove or plan for anything past end of life.
        parent_urn: urn:inflect:req:cis-controls-v8:2
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:2.3
        ref_id: "2.3"
        name: "Address Unauthorized Software"
        description: >
          Establish a process to detect software that is not authorized and remove or formally approve it.
        parent_urn: urn:inflect:req:cis-controls-v8:2
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:2.4
        ref_id: "2.4"
        name: "Utilize Automated Software Inventory Tools"
        description: >
          Automate collection of software inventory data to keep the list accurate and reduce manual effort.
        parent_urn: urn:inflect:req:cis-controls-v8:2
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:2.5
        ref_id: "2.5"
        name: "Allowlist Authorized Software"
        description: >
          Permit only explicitly approved software to execute on enterprise assets.
        parent_urn: urn:inflect:req:cis-controls-v8:2
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:2.6
        ref_id: "2.6"
        name: "Allowlist Authorized Libraries"
        description: >
          Restrict the code libraries that may load to those on an approved list.
        parent_urn: urn:inflect:req:cis-controls-v8:2
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:2.7
        ref_id: "2.7"
        name: "Allowlist Authorized Scripts"
        description: >
          Limit execution of scripts to those that have been explicitly authorized.
        parent_urn: urn:inflect:req:cis-controls-v8:2
        depth: 2
        assessable: true
        category: IG3
      # ─── Control 3: Data Protection ───
      - urn: urn:inflect:req:cis-controls-v8:3
        ref_id: "3"
        name: Data Protection
        description: >
          Identify, classify, and safeguard information across its life cycle so that sensitive data is handled, stored, and retired securely.
        depth: 1
        assessable: false
        category: Data Protection
      - urn: urn:inflect:req:cis-controls-v8:3.1
        ref_id: "3.1"
        name: "Establish and Maintain a Data Management Process"
        description: >
          Document how the enterprise handles data across its life cycle, covering sensitivity, ownership, retention, and disposal.
        parent_urn: urn:inflect:req:cis-controls-v8:3
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:3.2
        ref_id: "3.2"
        name: "Establish and Maintain a Data Inventory"
        description: >
          Keep a record of the sensitive data the enterprise holds, including where it lives and who owns it.
        parent_urn: urn:inflect:req:cis-controls-v8:3
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:3.3
        ref_id: "3.3"
        name: "Configure Data Access Control Lists"
        description: >
          Apply access controls so that only authorized users and services can reach specific data stores.
        parent_urn: urn:inflect:req:cis-controls-v8:3
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:3.4
        ref_id: "3.4"
        name: "Enforce Data Retention"
        description: >
          Retain data only for the period defined by policy and remove it once that period ends.
        parent_urn: urn:inflect:req:cis-controls-v8:3
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:3.5
        ref_id: "3.5"
        name: "Securely Dispose of Data"
        description: >
          Destroy or sanitize data and media so that discarded information cannot be recovered.
        parent_urn: urn:inflect:req:cis-controls-v8:3
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:3.6
        ref_id: "3.6"
        name: "Encrypt Data on End-User Devices"
        description: >
          Apply encryption to information stored on laptops, phones, and other end-user devices.
        parent_urn: urn:inflect:req:cis-controls-v8:3
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:3.7
        ref_id: "3.7"
        name: "Establish and Maintain a Data Classification Scheme"
        description: >
          Define sensitivity tiers and label data so that handling requirements follow its classification.
        parent_urn: urn:inflect:req:cis-controls-v8:3
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:3.8
        ref_id: "3.8"
        name: "Document Data Flows"
        description: >
          Map how sensitive data moves through and beyond the enterprise, including third-party exchanges.
        parent_urn: urn:inflect:req:cis-controls-v8:3
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:3.9
        ref_id: "3.9"
        name: "Encrypt Data on Removable Media"
        description: >
          Encrypt information written to USB drives and other removable storage.
        parent_urn: urn:inflect:req:cis-controls-v8:3
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:3.10
        ref_id: "3.10"
        name: "Encrypt Sensitive Data in Transit"
        description: >
          Protect sensitive data with encryption whenever it traverses networks.
        parent_urn: urn:inflect:req:cis-controls-v8:3
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:3.11
        ref_id: "3.11"
        name: "Encrypt Sensitive Data at Rest"
        description: >
          Encrypt sensitive information where it is stored on servers, databases, and applications.
        parent_urn: urn:inflect:req:cis-controls-v8:3
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:3.12
        ref_id: "3.12"
        name: "Segment Data Processing and Storage Based on Sensitivity"
        description: >
          Separate systems that handle sensitive data from those that do not, using network or logical boundaries.
        parent_urn: urn:inflect:req:cis-controls-v8:3
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:3.13
        ref_id: "3.13"
        name: "Deploy a Data Loss Prevention Solution"
        description: >
          Use tooling that identifies and blocks unauthorized movement of sensitive data.
        parent_urn: urn:inflect:req:cis-controls-v8:3
        depth: 2
        assessable: true
        category: IG3
      - urn: urn:inflect:req:cis-controls-v8:3.14
        ref_id: "3.14"
        name: "Log Sensitive Data Access"
        description: >
          Record access to sensitive data so that unusual or unauthorized use can be reviewed.
        parent_urn: urn:inflect:req:cis-controls-v8:3
        depth: 2
        assessable: true
        category: IG3
      # ─── Control 4: Secure Configuration of Enterprise Assets and Software ───
      - urn: urn:inflect:req:cis-controls-v8:4
        ref_id: "4"
        name: Secure Configuration of Enterprise Assets and Software
        description: >
          Establish and sustain hardened, well-documented configuration baselines for devices, operating systems, and applications.
        depth: 1
        assessable: false
        category: Secure Configuration of Enterprise Assets and Software
      - urn: urn:inflect:req:cis-controls-v8:4.1
        ref_id: "4.1"
        name: "Establish and Maintain a Secure Configuration Process"
        description: >
          Document and keep current a process for applying secure baseline settings to assets and software.
        parent_urn: urn:inflect:req:cis-controls-v8:4
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:4.2
        ref_id: "4.2"
        name: "Establish and Maintain a Secure Configuration Process for Network Infrastructure"
        description: >
          Maintain a defined process for securely configuring routers, switches, firewalls, and similar devices.
        parent_urn: urn:inflect:req:cis-controls-v8:4
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:4.3
        ref_id: "4.3"
        name: "Configure Automatic Session Locking on Enterprise Assets"
        description: >
          Set devices to lock automatically after a period of inactivity to limit unattended access.
        parent_urn: urn:inflect:req:cis-controls-v8:4
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:4.4
        ref_id: "4.4"
        name: "Implement and Manage a Firewall on Servers"
        description: >
          Run and maintain host-based or network firewalls that protect server assets.
        parent_urn: urn:inflect:req:cis-controls-v8:4
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:4.5
        ref_id: "4.5"
        name: "Implement and Manage a Firewall on End-User Devices"
        description: >
          Enable and manage a firewall on laptops, desktops, and similar end-user devices.
        parent_urn: urn:inflect:req:cis-controls-v8:4
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:4.6
        ref_id: "4.6"
        name: "Securely Manage Enterprise Assets and Software"
        description: >
          Administer assets and software through secure channels and vetted management tooling.
        parent_urn: urn:inflect:req:cis-controls-v8:4
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:4.7
        ref_id: "4.7"
        name: "Manage Default Accounts on Enterprise Assets and Software"
        description: >
          Disable or change built-in default accounts and credentials before assets enter use.
        parent_urn: urn:inflect:req:cis-controls-v8:4
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:4.8
        ref_id: "4.8"
        name: "Uninstall or Disable Unnecessary Services on Enterprise Assets and Software"
        description: >
          Remove or turn off features, services, and ports that are not needed for the asset to function.
        parent_urn: urn:inflect:req:cis-controls-v8:4
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:4.9
        ref_id: "4.9"
        name: "Configure Trusted DNS Servers on Enterprise Assets"
        description: >
          Point assets at DNS resolvers the enterprise trusts and controls.
        parent_urn: urn:inflect:req:cis-controls-v8:4
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:4.10
        ref_id: "4.10"
        name: "Enforce Automatic Device Lockout on Portable End-User Devices"
        description: >
          Configure portable devices to lock out after repeated failed authentication attempts.
        parent_urn: urn:inflect:req:cis-controls-v8:4
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:4.11
        ref_id: "4.11"
        name: "Enforce Remote Wipe Capability on Portable End-User Devices"
        description: >
          Enable the ability to remotely erase enterprise data from lost or stolen portable devices.
        parent_urn: urn:inflect:req:cis-controls-v8:4
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:4.12
        ref_id: "4.12"
        name: "Separate Enterprise Workspaces on Mobile End-User Devices"
        description: >
          Keep enterprise data isolated from personal data on mobile devices through separate managed workspaces.
        parent_urn: urn:inflect:req:cis-controls-v8:4
        depth: 2
        assessable: true
        category: IG3
      # ─── Control 5: Account Management ───
      - urn: urn:inflect:req:cis-controls-v8:5
        ref_id: "5"
        name: Account Management
        description: >
          Govern the full life cycle of user, administrator, and service credentials so that only intended identities exist and remain active.
        depth: 1
        assessable: false
        category: Account Management
      - urn: urn:inflect:req:cis-controls-v8:5.1
        ref_id: "5.1"
        name: "Establish and Maintain an Inventory of Accounts"
        description: >
          Maintain a record of all user and administrator accounts, including owner and status.
        parent_urn: urn:inflect:req:cis-controls-v8:5
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:5.2
        ref_id: "5.2"
        name: "Use Unique Passwords"
        description: >
          Require a distinct, sufficiently strong password for every account.
        parent_urn: urn:inflect:req:cis-controls-v8:5
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:5.3
        ref_id: "5.3"
        name: "Disable Dormant Accounts"
        description: >
          Identify and disable accounts that have gone unused beyond a defined period.
        parent_urn: urn:inflect:req:cis-controls-v8:5
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:5.4
        ref_id: "5.4"
        name: "Restrict Administrator Privileges to Dedicated Administrator Accounts"
        description: >
          Perform privileged work only with separate administrator accounts, not everyday user accounts.
        parent_urn: urn:inflect:req:cis-controls-v8:5
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:5.5
        ref_id: "5.5"
        name: "Establish and Maintain an Inventory of Service Accounts"
        description: >
          Track non-human service accounts, their purpose, and their owners.
        parent_urn: urn:inflect:req:cis-controls-v8:5
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:5.6
        ref_id: "5.6"
        name: "Centralize Account Management"
        description: >
          Manage accounts through a central directory or identity service where feasible.
        parent_urn: urn:inflect:req:cis-controls-v8:5
        depth: 2
        assessable: true
        category: IG2
      # ─── Control 6: Access Control Management ───
      - urn: urn:inflect:req:cis-controls-v8:6
        ref_id: "6"
        name: Access Control Management
        description: >
          Grant, verify, and revoke access to enterprise resources using least-privilege and strong authentication practices.
        depth: 1
        assessable: false
        category: Access Control Management
      - urn: urn:inflect:req:cis-controls-v8:6.1
        ref_id: "6.1"
        name: "Establish an Access Granting Process"
        description: >
          Follow a defined procedure to provision access rights when someone joins or changes role.
        parent_urn: urn:inflect:req:cis-controls-v8:6
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:6.2
        ref_id: "6.2"
        name: "Establish an Access Revoking Process"
        description: >
          Follow a defined procedure to remove access promptly when it is no longer needed.
        parent_urn: urn:inflect:req:cis-controls-v8:6
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:6.3
        ref_id: "6.3"
        name: "Require MFA for Externally-Exposed Applications"
        description: >
          Require multi-factor authentication for applications reachable from outside the enterprise.
        parent_urn: urn:inflect:req:cis-controls-v8:6
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:6.4
        ref_id: "6.4"
        name: "Require MFA for Remote Network Access"
        description: >
          Require multi-factor authentication for connections into the network from remote locations.
        parent_urn: urn:inflect:req:cis-controls-v8:6
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:6.5
        ref_id: "6.5"
        name: "Require MFA for Administrative Access"
        description: >
          Require multi-factor authentication whenever administrative privileges are used.
        parent_urn: urn:inflect:req:cis-controls-v8:6
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:6.6
        ref_id: "6.6"
        name: "Establish and Maintain an Inventory of Authentication and Authorization Systems"
        description: >
          Keep a record of the systems that perform authentication and authorization across the enterprise.
        parent_urn: urn:inflect:req:cis-controls-v8:6
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:6.7
        ref_id: "6.7"
        name: "Centralize Access Control"
        description: >
          Route access decisions through a central directory or single sign-on service where possible.
        parent_urn: urn:inflect:req:cis-controls-v8:6
        depth: 2
        assessable: true
        category: IG2
      - urn: urn:inflect:req:cis-controls-v8:6.8
        ref_id: "6.8"
        name: "Define and Maintain Role-Based Access Control"
        description: >
          Define access rights by role and review them so that permissions match job needs.
        parent_urn: urn:inflect:req:cis-controls-v8:6
        depth: 2
        assessable: true
        category: IG3
      # ─── Control 7: Continuous Vulnerability Management ───
      - urn: urn:inflect:req:cis-controls-v8:7
        ref_id: "7"
        name: Continuous Vulnerability Management
        description: >
          Continuously find, prioritize, and fix weaknesses in enterprise assets to shrink the window attackers can exploit.
        depth: 1
        assessable: false
        category: Continuous Vulnerability Management
      - urn: urn:inflect:req:cis-controls-v8:7.1
        ref_id: "7.1"
        name: "Establish and Maintain a Vulnerability Management Process"
        description: >
          Document a repeatable process for finding and tracking vulnerabilities in enterprise assets.
        parent_urn: urn:inflect:req:cis-controls-v8:7
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:7.2
        ref_id: "7.2"
        name: "Establish and Maintain a Remediation Process"
        description: >
          Define how identified vulnerabilities are prioritized and driven to closure.
        parent_urn: urn:inflect:req:cis-controls-v8:7
        depth: 2
        assessable: true
        category: IG1
      - urn: urn:inflect:req:cis-controls-v8:7.3
        ref_id: "7.3"
        name: "Perform Automated Operating System Patch Management"
        description: >
          Automate the delivery of operating-system security updates on a regular cadence.
        parent_urn: urn:inflect:req:cis-controls-v8:7
