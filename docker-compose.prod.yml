# ─── Production Environment ─────────────────────────────────
# Usage: docker compose -f docker-compose.prod.yml up -d --build
#
# Requires: .env.production (copy from .env.production.example)
#
# Connection architecture:
#   App → PgBouncer (pooled, transaction mode) → Postgres
#   Migrations → Postgres (direct, via DIRECT_DATABASE_URL)
# ────────────────────────────────────────────────────────────
services:
  # ── Postgres ──
  db:
    image: postgres:16-alpine
    container_name: inflect-prod-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inflect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-inflect_production}
    volumes:
      - prod-pgdata:/var/lib/postgresql/data
    tmpfs:
      - /tmp:size=256M        # Temp files never hit persistent disk
      - /run/postgresql:size=16M
    shm_size: '256m'           # Shared memory for Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inflect} -d ${POSTGRES_DB:-inflect_production}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Security: no ports exposed — only accessible from PgBouncer via internal network
    # Encryption at rest: use LUKS/dm-crypt on the host volume (see docs/encryption-data-protection.md)
    networks:
      - internal

  # ── PgBouncer (connection pooler) ──
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1-p2
    container_name: inflect-prod-pgbouncer
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-inflect}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-inflect_production}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "25"
      MAX_CLIENT_CONN: "200"
      MAX_DB_CONNECTIONS: "50"
      AUTH_TYPE: scram-sha-256
      STATS_PERIOD: "60"
      ADMIN_USERS: ${POSTGRES_USER:-inflect}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-inflect}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No ports exposed to host — only accessible from app via internal network
    networks:
      - internal

  # ── Redis (caching, jobs, async coordination) ──
  redis:
    image: redis:7-alpine
    container_name: inflect-prod-redis
    restart: always
    # Redis MUST require a password in a production-like deployment.
    # The :? syntax aborts `docker compose up` before the container
    # is created if REDIS_PASSWORD is unset — same fail-fast pattern
    # as DATA_ENCRYPTION_KEY below.
    # maxmemory-policy is `noeviction` (NOT allkeys-lru): Redis carries
    # BullMQ job state — an eviction policy would silently drop queued
    # jobs under memory pressure. noeviction makes Redis reject writes
    # (OOM) instead. Matches the ElastiCache parameter group. See
    # docs/deployment.md "Redis — per-environment policy".
    command: redis-server --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD is required — set it in .env.* before starting. Redis must not run unauthenticated in a production-like deployment.}" --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    environment:
      # redis-cli reads REDISCLI_AUTH automatically, so the healthcheck
      # authenticates without putting the password on the command line.
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - prod-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No ports exposed — only accessible from app via internal network
    networks:
      - internal

  # ── ClamAV (antivirus scanning) ──
  clamav:
    image: clamav/clamav:1.4
    container_name: inflect-prod-clamav
    restart: always
    volumes:
      - prod-clamav-defs:/var/lib/clamav
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    # No ports exposed — only accessible from app via internal network
    networks:
      - internal

  # ── Next.js App ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inflect-prod-app
    restart: always
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      # Runtime queries go through PgBouncer (pooled, transaction mode)
      DATABASE_URL: postgresql://${POSTGRES_USER:-inflect}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-inflect_production}?schema=public&pgbouncer=true
      # Migrations/introspection use direct Postgres connection (bypasses PgBouncer)
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-inflect}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-inflect_production}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CLAMAV_HOST: clamav:3310
      AV_SCAN_MODE: strict
      STORAGE_PROVIDER: s3
      FILE_STORAGE_ROOT: /data/uploads
      UPLOAD_DIR: /data/uploads
      # GAP-03 — fail-fast at `docker compose up` time if the master
      # encryption key is missing from .env.production. Compose's :?
      # syntax aborts the container start with a clear message before
      # the app process is even spawned.
      DATA_ENCRYPTION_KEY: "${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required for production. Generate with: openssl rand -base64 48}"
    volumes:
      - prod-uploads:/data/uploads
    # Security: run read-only filesystem where possible
    read_only: true
    tmpfs:
      - /tmp:size=128M
      - /app/.next/cache:size=512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - internal

  # ── Worker ────────────────────────────────────────────────────
  # The BullMQ worker + scheduler — a SEPARATE process from the
  # Next.js `app` service (same image, ENTRYPOINT overridden).
  # Without it NO scheduled job runs (task-due reminders, evidence
  # expiry, retention sweeps, the notification digest) and anything
  # the app enqueues piles up in Redis unprocessed. The command
  # registers the repeatable schedules (idempotent) then daemonises
  # the worker; if scheduling fails the `&&` aborts and `restart`
  # retries the whole sequence.
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inflect-prod-worker
    restart: always
    entrypoint: ["/bin/sh", "-c"]
    command: ["node dist/scheduler.mjs && node dist/worker.mjs"]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-inflect}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-inflect_production}?schema=public&pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-inflect}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-inflect_production}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CLAMAV_HOST: clamav:3310
      AV_SCAN_MODE: strict
      STORAGE_PROVIDER: s3
      FILE_STORAGE_ROOT: /data/uploads
      UPLOAD_DIR: /data/uploads
      DATA_ENCRYPTION_KEY: "${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required for production. Generate with: openssl rand -base64 48}"
    volumes:
      - prod-uploads:/data/uploads
    read_only: true
    tmpfs:
      - /tmp:size=256M
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  prod-pgdata:
    name: inflect-prod-pgdata
  prod-redisdata:
    name: inflect-prod-redisdata
  prod-uploads:
    name: inflect-prod-uploads
  prod-clamav-defs:
    name: inflect-prod-clamav-defs
