{{- /*
  Grafana dashboards ConfigMap — single source of truth.

  The three dashboard JSONs are NOT duplicated into this chart. The
  chart's ./dashboards is a symlink to the canonical compose location
  (infra/observability/grafana/dashboards), so the compose stack and
  this Helm chart serve byte-identical dashboards. `.Files.Glob` reads
  them through the symlink at template time.

  The ConfigMap carries the `grafana_dashboard` label the Grafana
  subchart's sidecar watches for (grafana.sidecar.dashboards.*), so the
  dashboards are imported automatically on install.
*/ -}}
{{- $sidecar := (index .Values "grafana" "sidecar" "dashboards") | default dict -}}
{{- if (ne $sidecar.enabled false) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: inflect-observability-dashboards
  namespace: {{ .Release.Namespace }}
  labels:
    {{ $sidecar.label | default "grafana_dashboard" }}: {{ $sidecar.labelValue | default "1" | quote }}
    app.kubernetes.io/part-of: inflect-observability
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
{{- $files := .Files.Glob "dashboards/*.json" }}
{{- if $files }}
{{- range $path, $bytes := $files }}
  {{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- else }}
  # No dashboards found under ./dashboards — verify the symlink to
  # infra/observability/grafana/dashboards is intact (single source of
  # truth). Guarded by tests/guardrails/observability-provisioning-coverage.test.ts.
  _placeholder: "{}"
{{- end }}
{{- end }}
