# Staging overrides — lean + ephemeral. Inherits base values.yaml.
#
# Staging is for shape-validation, not retention: storage is ephemeral
# (pods can be recreated freely) and resource requests are trimmed.
# Image tags stay pinned to the production versions (base values) so
# staging exercises the same component versions.

opentelemetry-collector:
  resources:
    limits:
      memory: 256Mi
      cpu: 500m
    requests:
      memory: 128Mi
      cpu: 100m
  # Keep more traces in staging for debugging.
  extraEnvs:
    - name: DEPLOYMENT_ENVIRONMENT
      value: "staging"
    - name: OTEL_SAMPLING_PERCENTAGE
      value: "100"

prometheus:
  server:
    persistentVolume:
      enabled: false
    retention: "3d"
    resources:
      limits:
        memory: 512Mi
        cpu: 500m
      requests:
        memory: 256Mi
        cpu: 100m

tempo:
  tempo:
    resources:
      limits:
        memory: 512Mi
        cpu: 500m
      requests:
        memory: 256Mi
        cpu: 100m
  persistence:
    enabled: false

grafana:
  resources:
    limits:
      memory: 256Mi
      cpu: 500m
    requests:
      memory: 128Mi
      cpu: 100m
  persistence:
    enabled: false
