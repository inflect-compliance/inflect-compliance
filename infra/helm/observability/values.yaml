# Base values for the self-hosted observability stack (PATH B).
#
# Mirrors infra/observability/docker-compose.observability.yml: the app
# PUSHES OTLP/HTTP to the collector; the collector exports metrics for
# Prometheus to scrape and traces to Tempo; Grafana reads both.
#
# `fullnameOverride` is set on every subchart so in-cluster service DNS
# matches the compose service names exactly (otel-collector / prometheus
# / tempo / grafana) — that keeps the collector exporter endpoints and
# the Prometheus scrape targets identical to the compose config.
#
# Component IMAGE tags below are pinned to the EXACT versions the compose
# stack runs, so both deploy paths run identical component versions:
#   otel-collector-contrib 0.123.0 · prometheus v3.3.0 · tempo 2.7.2 · grafana 11.6.0
#
# Per-env overrides: values-staging.yaml (lean, ephemeral) and
# values-production.yaml (compose-matching resource caps + persistence).

# ─── OpenTelemetry Collector (gateway) ───────────────────────────────
opentelemetry-collector:
  enabled: true
  fullnameOverride: otel-collector
  mode: deployment
  replicaCount: 1
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.123.0"
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
    metrics:
      enabled: true
      containerPort: 8888
      servicePort: 8888
    prom-exporter:
      enabled: true
      containerPort: 8889
      servicePort: 8889
      protocol: TCP
  resources:
    limits:
      memory: 512Mi
      cpu: 1000m
    requests:
      memory: 256Mi
      cpu: 250m
  # Verbatim port of infra/observability/otel-collector/config.yaml.
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
        spike_limit_mib: 100
      resourcedetection:
        detectors: [env, system]
        timeout: 5s
        override: false
      resource:
        attributes:
          - key: deployment.environment
            value: ${env:DEPLOYMENT_ENVIRONMENT}
            action: upsert
      probabilistic_sampler:
        sampling_percentage: ${env:OTEL_SAMPLING_PERCENTAGE}
      batch:
        timeout: 10s
        send_batch_size: 8192
        send_batch_max_size: 10000
    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
        resource_to_telemetry_conversion:
          enabled: true
        enable_open_metrics: true
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true
      debug:
        verbosity: basic
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    service:
      extensions: [health_check]
      telemetry:
        metrics:
          level: detailed
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [prometheus]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resourcedetection, resource, probabilistic_sampler, batch]
          exporters: [otlp/tempo, debug]
  extraEnvs:
    - name: DEPLOYMENT_ENVIRONMENT
      value: "kubernetes"
    - name: OTEL_SAMPLING_PERCENTAGE
      value: "20"

# ─── Prometheus ──────────────────────────────────────────────────────
prometheus:
  enabled: true
  fullnameOverride: prometheus
  # Single-server install; Alertmanager/pushgateway/node-exporter off
  # (Grafana unified alerting handles routing, same as compose).
  alertmanager:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  kube-state-metrics:
    enabled: false
  server:
    image:
      repository: prom/prometheus
      tag: "v3.3.0"
    global:
      scrape_interval: 30s
      scrape_timeout: 10s
      evaluation_interval: 30s
      external_labels:
        monitor: inflect-observability
    persistentVolume:
      enabled: false
    resources:
      limits:
        memory: 1Gi
        cpu: 1000m
      requests:
        memory: 512Mi
        cpu: 250m
  serverFiles:
    # Verbatim port of infra/observability/prometheus/prometheus.yml
    # (k8s service DNS == compose service names via fullnameOverride).
    prometheus.yml:
      scrape_configs:
        - job_name: otel-collector-app-metrics
          static_configs:
            - targets: ['otel-collector:8889']
              labels:
                component: app
        - job_name: otel-collector-self
          static_configs:
            - targets: ['otel-collector:8888']
              labels:
                component: collector
        - job_name: prometheus
          static_configs:
            - targets: ['localhost:9090']
              labels:
                component: prometheus
        - job_name: grafana
          metrics_path: /metrics
          static_configs:
            - targets: ['grafana:80']
              labels:
                component: grafana
        - job_name: tempo
          metrics_path: /metrics
          static_configs:
            - targets: ['tempo:3200']
              labels:
                component: tempo

# ─── Tempo (traces) ──────────────────────────────────────────────────
tempo:
  enabled: true
  fullnameOverride: tempo
  tempo:
    repository: grafana/tempo
    tag: "2.7.2"
    resources:
      limits:
        memory: 1Gi
        cpu: 1000m
      requests:
        memory: 512Mi
        cpu: 250m
  # OTLP receiver (gRPC :4317) — the collector's otlp/tempo exporter
  # target. HTTP receiver also enabled for direct senders.
  config: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
  persistence:
    enabled: false

# ─── Grafana (dashboards) ────────────────────────────────────────────
grafana:
  enabled: true
  fullnameOverride: grafana
  image:
    tag: "11.6.0"
  service:
    port: 80
  resources:
    limits:
      memory: 512Mi
      cpu: 750m
    requests:
      memory: 256Mi
      cpu: 250m
  # Datasources point at the in-cluster Prometheus + Tempo services.
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:80
          isDefault: true
        - name: Tempo
          type: tempo
          access: proxy
          url: http://tempo:3200
  # Sidecar imports any ConfigMap labelled `grafana_dashboard: "1"` —
  # this chart's dashboards-configmap.yaml carries the three JSON
  # dashboards (single source of truth: infra/observability/grafana/
  # dashboards, symlinked into ./dashboards).
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folder: /tmp/dashboards
    datasources:
      enabled: false
  # Anonymous + admin handled per-deployment; no secrets in this file.
  adminUser: admin
  persistence:
    enabled: false
