apiVersion: v2
name: inflect-observability
description: |
  Self-hosted observability stack for Inflect Compliance (PATH B).
  Umbrella chart bundling the OpenTelemetry Collector, Prometheus,
  Tempo, and Grafana — the same OTel/Prom/Tempo/Grafana topology the
  single-VM docker-compose deployment runs
  (infra/observability/docker-compose.observability.yml), repackaged
  for Kubernetes. Use this for air-gapped / on-prem / regulated
  deployments that cannot egress to a SaaS backend. For the managed
  alternative (lowest ops burden), use the Grafana Cloud Terraform
  module instead (infra/terraform/modules/observability).
type: application

# Chart version — SemVer of THIS chart's templates + values. Bump
# independently of the bundled component versions.
version: 0.1.0

# appVersion tracks the headline component (Grafana) for display only;
# each subchart's running image is pinned in values*.yaml to match the
# compose stack's image pins exactly.
appVersion: "11.6.0"

kubeVersion: ">= 1.28.0"

keywords:
  - observability
  - opentelemetry
  - prometheus
  - tempo
  - grafana

home: https://github.com/h0mele55/inflect-compliance
sources:
  - https://github.com/h0mele55/inflect-compliance

maintainers:
  - name: platform

# Upstream charts pinned by version. The CHART versions below select
# the templates; the running IMAGE tags are pinned in values.yaml to
# the exact versions the compose stack runs (otel-collector 0.123.0,
# prometheus v3.3.0, tempo 2.7.2, grafana 11.6.0) so both deploy paths
# run identical component versions. `helm dependency update` vendors
# these into charts/ before install.
dependencies:
  - name: opentelemetry-collector
    version: "0.111.0"
    repository: "https://open-telemetry.github.io/opentelemetry-helm-charts"
    condition: opentelemetry-collector.enabled
  - name: prometheus
    version: "27.5.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: tempo
    version: "1.18.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: tempo.enabled
  - name: grafana
    version: "8.10.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled
