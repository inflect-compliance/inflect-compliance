# Production overrides — inherits base values.yaml.
#
# Resource caps mirror the compose stack verbatim
# (docker-compose.observability.yml):
#   otel-collector  512m / 1.0 cpu
#   prometheus      1g   / 1.0 cpu
#   tempo           1g   / 1.0 cpu
#   grafana         512m / 0.75 cpu
# (The base values.yaml already encodes these limits; production
# re-affirms them and turns on persistence + retention.)

opentelemetry-collector:
  resources:
    limits:
      memory: 512Mi
      cpu: 1000m
    requests:
      memory: 256Mi
      cpu: 500m
  extraEnvs:
    - name: DEPLOYMENT_ENVIRONMENT
      value: "production"
    - name: OTEL_SAMPLING_PERCENTAGE
      value: "20"

prometheus:
  server:
    image:
      repository: prom/prometheus
      tag: "v3.3.0"
    persistentVolume:
      enabled: true
      size: 50Gi
    retention: "15d"
    resources:
      limits:
        memory: 1Gi
        cpu: 1000m
      requests:
        memory: 512Mi
        cpu: 500m

tempo:
  tempo:
    repository: grafana/tempo
    tag: "2.7.2"
    resources:
      limits:
        memory: 1Gi
        cpu: 1000m
      requests:
        memory: 512Mi
        cpu: 500m
  persistence:
    enabled: true
    size: 20Gi

grafana:
  image:
    tag: "11.6.0"
  resources:
    limits:
      memory: 512Mi
      cpu: 750m
    requests:
      memory: 256Mi
      cpu: 250m
  persistence:
    enabled: true
    size: 10Gi
