apiVersion: v2
name: inflect
description: |
  Inflect Compliance — multi-tenant compliance management platform.
  Packages the Next.js application as a Kubernetes Deployment with
  liveness + readiness probes wired to the app's /api/livez and
  /api/readyz endpoints.
type: application

# Chart version — SemVer of THIS chart's templates + defaults. Bump
# independently of appVersion when chart-level changes ship (new
# templates, breaking values changes, helper renames).
version: 0.1.0

# App version — must match package.json version. Used as the default
# image tag in values.yaml and surfaced as
# app.kubernetes.io/version on every rendered resource. Bump in
# lock-step with package.json on each app release.
appVersion: "1.188.0"

kubeVersion: ">= 1.28.0"

keywords:
  - compliance
  - grc
  - multi-tenant
  - nextjs

home: https://github.com/h0mele55/inflect-compliance
sources:
  - https://github.com/h0mele55/inflect-compliance

maintainers:
  - name: platform
