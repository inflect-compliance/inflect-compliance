# Production overrides for the inflect chart.
#
# Apply with:
#   helm upgrade --install inflect-production infra/helm/inflect \
#     --namespace inflect-production --create-namespace \
#     --values infra/helm/inflect/values-production.yaml
#
# Per OI-2 spec: production = 2+ replicas, larger resources, HPA enabled.

# ── App: HPA enabled (2 → 10 replicas), larger resources ────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # Latency metric requires a Prometheus Adapter — enable once the
  # adapter is wired in the production cluster.
  latency:
    enabled: false
    metricName: api_request_duration_p95_milliseconds
    targetAverageValue: "500"
  # Production behavior: scale up fast, scale down slow.
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

# PodDisruptionBudget — ENABLED in production. maxUnavailable: 1 keeps at
# least 1 pod available under the HPA's minReplicas: 2 floor, so a node
# drain (k8s upgrade / autoscaler scale-in) can't evict both app pods
# simultaneously. The worker (replicaCount: 2) gets the same protection.
pdb:
  app:
    enabled: true
    maxUnavailable: 1
  worker:
    enabled: true
    maxUnavailable: 1

# Larger app resources for production traffic.
resources:
  requests:
    cpu: "1"
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

# ── Worker: 2 replicas, larger resources ────────────────────────────
worker:
  replicaCount: 2
  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# ── PgBouncer: production pool sizes ────────────────────────────────
pgbouncer:
  config:
    PGBOUNCER_PORT: "5432"
    PGBOUNCER_BIND_ADDRESS: "127.0.0.1"
    PGBOUNCER_POOL_MODE: transaction
    PGBOUNCER_MAX_CLIENT_CONN: "1000"
    PGBOUNCER_DEFAULT_POOL_SIZE: "25"
    PGBOUNCER_AUTH_TYPE: scram-sha-256
    PGBOUNCER_DATABASE: inflect_compliance
    POSTGRESQL_HOST: REPLACE_ME_RDS_PRODUCTION_ENDPOINT
    POSTGRESQL_PORT: "5432"
    POSTGRESQL_USERNAME: postgres
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── Image tag pinning (optional — pin in prod for reproducibility) ──
image:
  tag: ""

# ── Service ─────────────────────────────────────────────────────────
service:
  enabled: true
  type: ClusterIP
  port: 80

# ── Ingress: production hostname, HSTS preload-eligible ─────────────
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    hosts:
      - hosts:
          - app.example.com
        secretName: app-example-com-tls
  forceSslRedirect: true
  rateLimit:
    enabled: true
    requestsPerMinute: 600
    burstMultiplier: 5
  hsts:
    enabled: true
    maxAgeSeconds: 31536000
    includeSubDomains: true
    # Preload-eligible only after the domain is submitted to
    # https://hstspreload.org and the listing has been confirmed.
    # Removing the domain from the preload list later is slow.
    preload: true
  proxyBodySize: 100m

# ── NetworkPolicy: ENABLED, locked to production VPC + ingress-nginx ─
networkPolicy:
  enabled: true
  ingressFrom:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
  vpcCidrBlock: "10.0.0.0/16"
  databasePort: 5432
  redisPort: 6379
  allowHttpsEgress: true
  blockImdsEgress: true

# ── Pod scheduling: spread across AZs for HA ────────────────────────
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: inflect
        app.kubernetes.io/instance: inflect-production
        app.kubernetes.io/component: app
