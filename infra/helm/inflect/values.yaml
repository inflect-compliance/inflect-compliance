# Default values for the inflect chart.
#
# This file holds env-agnostic defaults. Per-environment overrides
# (replicaCount, resources, image tag pinning) land in
# values-staging.yaml / values-production.yaml in a follow-up PR.

# ── Replica count ────────────────────────────────────────────────────
# Used ONLY when autoscaling.enabled = false. When the HPA is on,
# the chart drops spec.replicas from the Deployment so Helm and HPA
# don't fight over the field on each helm upgrade.
replicaCount: 1

# ── Image ────────────────────────────────────────────────────────────
image:
  # Built and pushed by .github/workflows/ghcr-publish.yml + deploy.yml.
  repository: ghcr.io/h0mele55/inflect-compliance
  # Empty tag falls back to .Chart.AppVersion via the inflect.image
  # helper. Set explicitly for floating tags or env pinning.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ── Naming ───────────────────────────────────────────────────────────
nameOverride: ""
fullnameOverride: ""

# ── Service account ──────────────────────────────────────────────────
serviceAccount:
  create: true
  # automount = true so the in-cluster API server is reachable by the
  # app for K8s-aware features (the app doesn't need this today; flip
  # to false when ECS/EKS workload identity wires Secrets Manager
  # access via IRSA instead of the SA token).
  automount: true
  annotations: {}
  name: ""

# ── Pod-level security ──────────────────────────────────────────────
podSecurityContext:
  fsGroup: 1001
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001

# ── Container-level security ────────────────────────────────────────
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  # Next.js writes .next/cache at runtime — leave the rootfs writable
  # for now. Switch to true when caches are mounted via emptyDir.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1001

# ── Pod metadata ────────────────────────────────────────────────────
podAnnotations: {}
podLabels: {}

# ── Container port ──────────────────────────────────────────────────
# Matches the app's `PORT=3000` default and the OI-1 vpc module's
# var.app_ingress_port (the ALB → app SG ingress is opened on this).
containerPort: 3000

# ── App container command override ──────────────────────────────────
# Override the image's default ENTRYPOINT (./scripts/entrypoint.sh)
# to skip its embedded `prisma migrate deploy` step — migrations run
# as a Helm pre-install/pre-upgrade hook (see migration-job.yaml).
# Without the override, every app pod restart would re-run migrations
# against the live DB; idempotent but wasteful and ordering-fragile.
#
# Empty list = use the image's default ENTRYPOINT (still runs migrate
# inline, suitable for environments where the Helm hook is disabled).
command:
  - node_modules/.bin/next
args:
  - start
  - -p
  - "3000"
  - -H
  - 0.0.0.0

# ── Resources ────────────────────────────────────────────────────────
# OI-2 spec defaults:
#   request: 512Mi memory, 1 CPU
#   limit:   1Gi memory, 2 CPU
resources:
  requests:
    cpu: "1"
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

# ── Probes ───────────────────────────────────────────────────────────
# /api/livez: dependency-free liveness check (just confirms the Node
#             event loop is responsive).
# /api/readyz: checks DB + Redis + storage; returns 503 if any is
#              unreachable. failureThreshold + initialDelaySeconds
#              give the pod ~30s grace at boot.
livenessProbe:
  httpGet:
    path: /api/livez
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  httpGet:
    path: /api/readyz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# ── Environment from ConfigMap + Secret ─────────────────────────────
# The Deployment uses envFrom: [configMapRef, secretRef]. Names default
# to <fullname>-config and <fullname>-secrets when `name` is empty;
# override to point at externally-managed resources (e.g. one created
# by External Secrets Operator pulling from AWS Secrets Manager).
#
# The actual ConfigMap and Secret resource templates are NOT created
# by this chart in this iteration — they land in a follow-up PR.
# Operators provide them externally for now.
envFrom:
  configMap:
    enabled: true
    name: ""
  secret:
    enabled: true
    name: ""

# ── Extra env injection ─────────────────────────────────────────────
# extraEnv: list of {name, value} OR {name, valueFrom} entries
#           merged into the container's `env`.
# extraEnvFrom: list of {configMapRef|secretRef|...} merged into
#               envFrom AFTER the chart-managed entries above.
#
# CDN: when fronting this deployment with CloudFront (see docs/cdn.md),
# set ASSET_PREFIX to the CDN domain so the HTML emits CDN-hosted URLs
# for /_next/static/*. Next.js already emits the immutable Cache-Control
# header for hashed bundles, which the ingress passes through — so no
# extra ingress cache annotation is needed. Example:
#   extraEnv:
#     - name: ASSET_PREFIX
#       value: "https://cdn.inflect.app"
extraEnv: []
extraEnvFrom: []

# ── Scheduling (app) ────────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

# ── HorizontalPodAutoscaler (app only, not worker) ──────────────────
# Per OI-2 spec:
#   - 2 → 10 replicas
#   - CPU target 70% (always on)
#   - latency metric from OTel (optional — requires Prometheus Adapter
#     publishing the api.request.duration histogram as a Pods-type
#     external metric. Default off so the chart works in clusters that
#     haven't wired the adapter yet.)
#
# When enabled = true, the app Deployment OMITS spec.replicas. The HPA
# template uses autoscaling/v2 so the metrics field is the modern
# multi-metric shape.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  # CPU utilization target as a percentage of the container's CPU
  # request. With request=1 CPU and target=70%, the HPA scales when
  # average CPU usage across pods exceeds 700m sustained.
  targetCPUUtilizationPercentage: 70

  # Optional latency metric. Source-of-truth is the OTel
  # `api.request.duration` histogram (see infra/README.md → Metrics
  # Inventory). Enable once a Prometheus Adapter is configured to
  # publish a per-pod scalar derived from the histogram (e.g. P95).
  latency:
    enabled: false
    # Metric name as published by the adapter to the
    # custom.metrics.k8s.io API. Adjust to match your adapter config.
    metricName: api_request_duration_p95_milliseconds
    # Target value with optional unit suffix. Quantity type — read the
    # adapter's units carefully:
    #   "500"   → if metric is in milliseconds (most common)
    #   "500m"  → 500 milli-units (i.e. 0.5 of whatever the metric is)
    targetAverageValue: "500"

  # Behavior — controls how aggressively HPA scales up/down. Defaults
  # are Kubernetes' built-ins; override per environment for tighter
  # production scaling.
  behavior: {}
  # Example for production:
  # behavior:
  #   scaleDown:
  #     stabilizationWindowSeconds: 300
  #     policies:
  #       - type: Percent
  #         value: 50
  #         periodSeconds: 60
  #   scaleUp:
  #     stabilizationWindowSeconds: 0
  #     policies:
  #       - type: Percent
  #         value: 100
  #         periodSeconds: 30

# ── PodDisruptionBudget ─────────────────────────────────────────────
# Protect against VOLUNTARY disruptions (node drain, cluster autoscaler
# scale-in, k8s upgrades) — the HPA reacts to load, not to disruption
# velocity, so without a PDB a node drain can evict every pod at once.
# Set maxUnavailable: 1 unless you have a specific reason to widen it.
# Enable in production; leave disabled in staging where single-pod
# restarts are fine (a PDB with maxUnavailable: 1 on a single-replica
# Deployment would BLOCK every drain).
pdb:
  app:
    enabled: false
    maxUnavailable: 1
  worker:
    enabled: false
    maxUnavailable: 1

# ── PgBouncer sidecar (app pod only) ────────────────────────────────
# Per OI-2 spec — sidecar pooling so the app doesn't directly hold
# Postgres connections. Listens on 127.0.0.1:5432 (overrides the
# bitnami image's default 6432). The app's runtime ConfigMap must set:
#
#   DATABASE_URL=postgresql://<user>:<password>@localhost:5432/<db>?...
#
# DIRECT_DATABASE_URL stays pointed at the upstream RDS endpoint so
# migrations and worker DDL paths bypass PgBouncer (transaction-mode
# pools break Prisma's session-level locks).
#
# Worker pods do NOT get this sidecar (workers tend to hold
# connections longer for batch processing; pooling matters less).
pgbouncer:
  enabled: true

  image:
    repository: bitnami/pgbouncer
    tag: "1.22.1"
    pullPolicy: IfNotPresent

  port: 5432

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

  # Static (non-secret) PgBouncer config — passed as container env
  # vars. The bitnami/pgbouncer image translates these into a
  # generated pgbouncer.ini at start. Common knobs are exposed below;
  # operators add others by adding entries to this map.
  #
  # POSTGRESQL_HOST is intentionally empty here — env-specific. Set
  # via values-{staging,production}.yaml in a follow-up PR (will
  # default to `terraform output db_address` from Epic OI-1).
  config:
    # Bind localhost so the sidecar is unreachable from outside the
    # pod. App connects via localhost:5432.
    PGBOUNCER_PORT: "5432"
    PGBOUNCER_BIND_ADDRESS: "127.0.0.1"

    # Pool mode — transaction matches the app's existing PgBouncer
    # config in deploy/docker-compose.prod.yml.
    PGBOUNCER_POOL_MODE: transaction

    # Connection limits — defaults sized for the app's typical pod
    # concurrency. Bump per env when scaling.
    PGBOUNCER_MAX_CLIENT_CONN: "1000"
    PGBOUNCER_DEFAULT_POOL_SIZE: "25"

    # Auth — RDS Postgres 16 supports SCRAM-SHA-256.
    PGBOUNCER_AUTH_TYPE: scram-sha-256

    # Database to pool. Single-DB mode; "*" to pool all DBs on the
    # upstream host (rare for our deployment).
    PGBOUNCER_DATABASE: inflect_compliance

    # Upstream Postgres connection.
    POSTGRESQL_HOST: ""              # MUST be set via per-env values
    POSTGRESQL_PORT: "5432"
    POSTGRESQL_USERNAME: postgres    # bitnami env name (NOT USER)

  # Upstream password reference. Decoupled from the app's runtime
  # Secret because the bitnami image expects a SPECIFIC env var name
  # (POSTGRESQL_PASSWORD). Operators provide this Secret in the
  # target namespace via External Secrets Operator pulling from AWS
  # Secrets Manager (Epic OI-1's RDS-managed credentials secret).
  passwordSecret:
    # Empty name = derived as <fullname>-pgbouncer
    name: ""
    key: POSTGRESQL_PASSWORD

  # PgBouncer health is a TCP listen on its port — no HTTP layer.
  livenessProbe:
    enabled: true
    tcpSocket:
      port: 5432
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    enabled: true
    tcpSocket:
      port: 5432
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 1001

# ── PgBouncer (read replica) ────────────────────────────────────────
# A SECOND PgBouncer pool pointed at the read replica (DATABASE_READ_URL),
# mirroring the primary `pgbouncer` block above. PgBouncer can't
# read/write-split natively, so the replica gets its own pool; the app's
# `prismaRead` client connects through it. Gated — enable alongside the
# terraform `db_enable_read_replica`. When disabled, `prismaRead` falls
# back to the primary (single-DB mode). See docs/database-routing.md.
#
# Like the primary pool, this runs as a sidecar on the app Deployment;
# wiring the second sidecar container + the DATABASE_READ_URL env into
# deployment.yaml is the operator step when enabling (the config knobs
# live here so the values contract is stable first).
pgbouncerRead:
  enabled: false

  image:
    repository: bitnami/pgbouncer
    tag: "1.22.1"
    pullPolicy: IfNotPresent

  # Distinct localhost port so it can co-exist with the primary pool
  # sidecar (5432). prismaRead's DATABASE_READ_URL targets localhost:5433.
  port: 5433

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

  config:
    PGBOUNCER_PORT: "5433"
    PGBOUNCER_BIND_ADDRESS: "127.0.0.1"
    # Transaction mode matches the primary pool + the app's tx-scoped RLS.
    PGBOUNCER_POOL_MODE: transaction
    PGBOUNCER_MAX_CLIENT_CONN: "1000"
    PGBOUNCER_DEFAULT_POOL_SIZE: "25"

# ── BullMQ worker ───────────────────────────────────────────────────
# Separate Deployment running the same image, different command. No
# HPA — manual scaling per the OI-2 spec. Workers don't expose HTTP,
# so probes are off by default; operators can wire exec probes via
# .Values.worker.livenessProbe / readinessProbe if they add a
# /healthz endpoint to the worker process.
worker:
  enabled: true

  # Defaults to .Values.replicaCount-style override. Manual scaling.
  replicaCount: 1

  # Image inherits from .Values.image — same repository + tag as the
  # main app. Override only when running a worker fork from a different
  # registry path.
  image:
    repository: ""   # empty = use .Values.image.repository
    tag: ""          # empty = use .Values.image.tag (which falls back to .Chart.AppVersion)
    pullPolicy: ""   # empty = use .Values.image.pullPolicy

  # Worker entrypoint. The Node 24 `--import tsx` syntax loads the
  # tsx loader, so scripts/worker.ts can stay TypeScript without a
  # build step.
  command:
    - node
    - --import
    - tsx
    - scripts/worker.ts
  args: []

  # Resources — workers do CPU-bound job processing; memory needs are
  # smaller than the web tier.
  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

  # Probes off by default. BullMQ workers don't listen on a port; a
  # liveness probe is only meaningful if the worker exposes /healthz
  # itself (operator's choice). Set `enabled: true` + provide an
  # httpGet/exec block to enable.
  livenessProbe:
    enabled: false
    # Example exec probe a future PR could enable:
    # exec:
    #   command: ["sh", "-c", "kill -0 1"]
    # initialDelaySeconds: 30
    # periodSeconds: 30
  readinessProbe:
    enabled: false

  # Worker pods inherit the same envFrom (ConfigMap + Secret) as the
  # app — they need DATABASE_URL, REDIS_URL, DATA_ENCRYPTION_KEY, etc.
  # No separate worker config; one source of truth.
  podSecurityContext:
    fsGroup: 1001
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 1001

  podAnnotations: {}
  podLabels: {}

  # Manual graceful-shutdown grace period. BullMQ jobs can take time
  # to drain; 60s lets in-flight jobs finish without forced kill.
  terminationGracePeriodSeconds: 60

  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

# ── Migration Job (Helm pre-install/pre-upgrade hook) ───────────────
# Runs `prisma migrate deploy` BEFORE app/worker rollout, so the
# schema is up-to-date by the time the new image starts serving.
# Helm waits for the hook Job to complete before progressing.
migration:
  enabled: true

  # Image inherits from .Values.image. Different image only if you
  # build a separate "migrations" image (rare — most teams reuse app).
  image:
    repository: ""   # empty = use .Values.image.repository
    tag: ""          # empty = use .Values.image.tag (→ .Chart.AppVersion)
    pullPolicy: ""

  # Pinned Prisma CLI version — matches the entrypoint.sh comment
  # documenting the Prisma 7 datasource breakage. `--yes` skips the
  # npx install confirmation prompt.
  command:
    - npx
    - --yes
    - prisma@5.22.0
    - migrate
    - deploy
    - --schema=./prisma/schema

  # Resources sized for the migrate process — small.
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

  # backoffLimit: 0 — a failed migration is an intentional stop. Helm
  # will fail the install/upgrade and roll back, surfacing the failure
  # at the right boundary. Retrying a half-applied migration is rarely
  # safe.
  backoffLimit: 0

  # ttlSecondsAfterFinished — Job auto-deletes after this many seconds
  # post-completion. Combined with `helm.sh/hook-delete-policy:
  # hook-succeeded` below, this is belt-and-braces cleanup.
  ttlSecondsAfterFinished: 600

  # Hook weight — lower runs earlier. Keeping migration at -5 leaves
  # room for higher-priority hooks (e.g. namespace setup at -10) and
  # lower-priority cleanup hooks (>0).
  hookWeight: "-5"

  # Hook delete policy:
  #   before-hook-creation: delete prior Job before creating new one
  #                          (re-running upgrade works deterministically)
  #   hook-succeeded:        delete Job after it succeeds (clean ns)
  hookDeletePolicy: before-hook-creation,hook-succeeded

  podAnnotations: {}
  podLabels: {}

  podSecurityContext:
    fsGroup: 1001
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 1001

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── Service (cluster-internal) ──────────────────────────────────────
# ClusterIP Service fronting the app pods. Required for Ingress to
# have a backend; selectors match component=app only (worker pods
# are NOT routed to via this Service).
service:
  enabled: true
  type: ClusterIP
  port: 80
  annotations: {}

# ── NetworkPolicy (least-privilege egress) ──────────────────────────
# Per OI-2 spec — allow egress only to:
#   - kube-dns (DNS resolution; required for everything else to work)
#   - VPC CIDR on 5432 + 6379 (managed RDS + ElastiCache)
#   - 0.0.0.0/0 :443 (HTTPS — S3, Secrets Manager, STS, OAuth) with
#     169.254.169.254 EXCEPTED so pods can't reach IMDS
# Deny everything else.
#
# Default: enabled = false because most non-prod clusters don't have
# a NetworkPolicy controller (kindnet, calico, cilium). Production
# values file flips it on.
networkPolicy:
  enabled: false

  # Sources allowed to reach the app on .Values.containerPort.
  # Default opens to the standard ingress-nginx namespace; operators
  # using a different controller (or in-cluster mesh) override this.
  ingressFrom:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx

  # Optional extra ingress rules (added verbatim to the policy).
  extraIngress: []

  # In-cluster DNS — used to construct the egress allow rule for
  # kube-dns. Defaults match the standard EKS / vanilla K8s setup.
  dnsNamespace: kube-system
  dnsPodLabel: kube-dns

  # VPC CIDR — RDS + ElastiCache live here. Default matches OI-1's
  # vpc module's `cidr_block` default.
  vpcCidrBlock: "10.0.0.0/16"
  databasePort: 5432
  redisPort: 6379

  # HTTPS egress to internet (S3, AWS APIs, OAuth providers).
  allowHttpsEgress: true
  # When true (default), the IMDS service IP is excepted from the
  # HTTPS egress allow — IRSA-friendly. Disable for EKS Pod Identity
  # which DOES use IMDS internally.
  blockImdsEgress: true

  # Optional extra egress rules (added verbatim to the policy).
  extraEgress: []

# ── Ingress ─────────────────────────────────────────────────────────
# Per OI-2 spec — TLS termination, rate limit, HSTS. Controller-
# agnostic: defaults are NGINX-Ingress annotations; ALB Ingress
# Controller users override `className` + `annotations` wholesale.
ingress:
  enabled: false

  # Set to "nginx" for ingress-nginx, "alb" for AWS Load Balancer
  # Controller, or any other valid IngressClass name.
  className: ""

  hosts: []
  # Example:
  # hosts:
  #   - host: app.example.com
  #     paths:
  #       - path: /
  #         pathType: Prefix

  tls:
    enabled: true
    # Each entry: { hosts: [...], secretName: "..." }. The Secret is
    # operator-managed (cert-manager / pre-existing).
    hosts: []
    # Example:
    # hosts:
    #   - hosts: [app.example.com]
    #     secretName: app-example-com-tls

  # Force HTTP → HTTPS redirect at the ingress.
  forceSslRedirect: true

  # Rate limiting — nginx-ingress per-IP. Operators on ALB Ingress
  # Controller use AWS WAF web ACLs instead (annotation:
  # alb.ingress.kubernetes.io/wafv2-acl-arn).
  rateLimit:
    enabled: true
    requestsPerMinute: 600
    burstMultiplier: 5

  # HSTS via the nginx-ingress configuration-snippet. Disable if your
  # controller doesn't allow snippets (CVE-2021-25742-restricted
  # deployments) — configure HSTS at the controller level instead.
  hsts:
    enabled: true
    maxAgeSeconds: 31536000
    includeSubDomains: true
    preload: true

  # Max upload body size (matches the app's FILE_MAX_SIZE_BYTES).
  proxyBodySize: 100m

  # Extra annotations merged on top of the chart's defaults. Use this
  # to swap in ALB-specific annotations:
  #   alb.ingress.kubernetes.io/scheme: internet-facing
  #   alb.ingress.kubernetes.io/target-type: ip
  #   alb.ingress.kubernetes.io/wafv2-acl-arn: <arn>
  annotations: {}
