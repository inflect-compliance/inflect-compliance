{{- if .Values.worker.autoscaling.enabled -}}
# KEDA TriggerAuthentication — supplies the Redis password to the worker
# ScaledObject's redis scaler from the app's runtime secret. KEDA's redis
# scaler can't parse REDIS_URL, so it reads the password separately; the
# operator MUST ensure `passwordSecretKey` exists in the envFrom secret
# (or override it) before enabling autoscaling. See
# docs/worker-autoscaling.md § prerequisites.
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: {{ include "inflect.fullname" . }}-keda-redis-auth
  labels:
    {{- include "inflect.labels" (dict "ctx" . "component" "worker") | nindent 4 }}
spec:
  secretTargetRef:
    - parameter: password
      name: {{ include "inflect.envFromSecretName" . }}
      key: {{ .Values.worker.autoscaling.redis.passwordSecretKey }}
{{- end }}
