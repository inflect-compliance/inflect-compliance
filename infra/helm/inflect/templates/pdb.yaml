{{/*
PodDisruptionBudget — protects the app + worker Deployments against
VOLUNTARY disruptions (node drain during a k8s upgrade, cluster
autoscaler scale-in, kube-system node compaction). The HPA reacts to
LOAD, not to disruption velocity, so without a PDB a single node drain
can evict every pod at once and cause a hard outage.

Two budgets, each independently gated, so an operator can disable one
component (e.g. a single-replica staging cluster where a PDB with
maxUnavailable: 1 would block every drain).

`maxUnavailable: 1` (rather than a percentage min-available): the
canonical safe default for an HA workload — it survives an HPA shrink to
minReplicas without ever blocking, whereas a percentage floor plays
poorly during scale-down. policy/v1 is stable since k8s 1.21 (chart
floor is >= 1.28).

The selector mirrors each Deployment's pod selector EXACTLY by reusing
`inflect.selectorLabels` with the same component — so the PDB and its
Deployment can never drift apart.
*/}}
{{- if .Values.pdb.app.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "inflect.fullname" . }}-app
  labels:
    {{- include "inflect.labels" (dict "ctx" . "component" "app") | nindent 4 }}
spec:
  maxUnavailable: {{ .Values.pdb.app.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "inflect.selectorLabels" (dict "ctx" . "component" "app") | nindent 6 }}
{{- end }}
{{- if .Values.pdb.worker.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "inflect.fullname" . }}-worker
  labels:
    {{- include "inflect.labels" (dict "ctx" . "component" "worker") | nindent 4 }}
spec:
  maxUnavailable: {{ .Values.pdb.worker.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "inflect.selectorLabels" (dict "ctx" . "component" "worker") | nindent 6 }}
{{- end }}
