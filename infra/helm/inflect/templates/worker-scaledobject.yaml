{{- if .Values.worker.autoscaling.enabled -}}
# KEDA ScaledObject — autoscales the BullMQ worker Deployment by queue
# depth. KEDA must already be installed cluster-wide (PATH A — see
# NOTES.txt + docs/worker-autoscaling.md). The redis scaler reads the
# length of the BullMQ `wait` list and targets `listLength` waiting jobs
# per worker pod.
#
# Out of scope: per-priority scaling (KEDA's redis scaler reads total
# list length), sub-30s reaction (polling interval), cross-queue scaling
# (one trigger per queue).
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "inflect.fullname" . }}-worker
  labels:
    {{- include "inflect.labels" (dict "ctx" . "component" "worker") | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ include "inflect.fullname" . }}-worker
  minReplicaCount: {{ .Values.worker.autoscaling.minReplicas }}
  maxReplicaCount: {{ .Values.worker.autoscaling.maxReplicas }}
  pollingInterval: {{ .Values.worker.autoscaling.pollingInterval }}
  cooldownPeriod: {{ .Values.worker.autoscaling.cooldownPeriod }}
  triggers:
    - type: redis
      metadata:
        # BullMQ stores waiting jobs at `bull:<queue>:wait`. Pinned to the
        # BullMQ key layout — if BullMQ ever changes this key the scaler
        # breaks SILENTLY (queue looks empty → never scales up). See the
        # failure-mode note in docs/worker-autoscaling.md.
        listName: bull:{{ .Values.worker.autoscaling.queueName | default "inflect-jobs" }}:wait
        listLength: {{ .Values.worker.autoscaling.targetQueueDepth | quote }}
        # KEDA's redis scaler needs host:port (it cannot parse REDIS_URL).
        # Resolved from the worker pod's env; the operator must ensure this
        # key exists / override it (docs/worker-autoscaling.md § prerequisites).
        addressFromEnv: {{ .Values.worker.autoscaling.redis.addressFromEnv }}
      authenticationRef:
        name: {{ include "inflect.fullname" . }}-keda-redis-auth
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        # Scale up fast, scale down slow — mirrors the app HPA pattern so
        # a burst is absorbed immediately but drain-down is gradual.
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 30
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
{{- end }}
