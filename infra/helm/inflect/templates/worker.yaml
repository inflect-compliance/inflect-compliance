{{- if .Values.worker.enabled -}}
# BullMQ worker — separate Deployment running the same image with a
# different command. Manual scaling per the OI-2 spec (no HPA wired in
# this chart). Workers don't expose HTTP, so probes are off by default
# (see comment in values.yaml under `worker.livenessProbe`).
#
# Distinct labels: app.kubernetes.io/component = "worker", which
# carries through to selectorLabels so the app and worker Deployments
# have non-overlapping selectors and never share a ReplicaSet.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inflect.fullname" . }}-worker
  labels:
    {{- include "inflect.labels" (dict "ctx" . "component" "worker") | nindent 4 }}
spec:
  {{- /* When KEDA autoscaling is on, OMIT replicas — KEDA's HPA owns the
         field. If both Helm and the HPA set it, every `helm upgrade`
         resets the replica count and fights the autoscaler (same pattern
         as the app deployment.yaml + hpa.yaml). */}}
  {{- if not .Values.worker.autoscaling.enabled }}
  replicas: {{ .Values.worker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "inflect.selectorLabels" (dict "ctx" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      {{- with .Values.worker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "inflect.labels" (dict "ctx" . "component" "worker") | nindent 8 }}
        {{- with .Values.worker.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "inflect.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount | default false }}
      terminationGracePeriodSeconds: {{ .Values.worker.terminationGracePeriodSeconds }}
      {{- with .Values.worker.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "inflect.workerImage" . }}
          imagePullPolicy: {{ default .Values.image.pullPolicy .Values.worker.image.pullPolicy }}
          {{- with .Values.worker.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.worker.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.worker.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            {{- if .Values.envFrom.configMap.enabled }}
            - configMapRef:
                name: {{ include "inflect.envFromConfigMapName" . }}
            {{- end }}
            {{- if .Values.envFrom.secret.enabled }}
            - secretRef:
                name: {{ include "inflect.envFromSecretName" . }}
            {{- end }}
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.worker.livenessProbe.enabled }}
          livenessProbe:
            {{- omit .Values.worker.livenessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.worker.readinessProbe.enabled }}
          readinessProbe:
            {{- omit .Values.worker.readinessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
