# ─── Staging Environment ────────────────────────────────────
# Usage: docker compose -f docker-compose.staging.yml up -d --build
#
# Requires: .env.staging (copy from .env.staging.example)
#
# Connection architecture:
#   App → PgBouncer (pooled, transaction mode) → Postgres
#   Migrations → Postgres (direct, via DIRECT_DATABASE_URL)
# ────────────────────────────────────────────────────────────
services:
  # ── Postgres ──
  postgres:
    image: postgres:16-alpine
    container_name: inflect-staging-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inflect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-staging_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-inflect_staging}
    volumes:
      - staging-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inflect} -d ${POSTGRES_DB:-inflect_staging}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── PgBouncer (connection pooler) ──
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1-p2
    container_name: inflect-staging-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-inflect}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-staging_password_change_me}
      DB_NAME: ${POSTGRES_DB:-inflect_staging}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "25"
      MAX_CLIENT_CONN: "200"
      MAX_DB_CONNECTIONS: "50"
      AUTH_TYPE: scram-sha-256
      STATS_PERIOD: "60"
      ADMIN_USERS: ${POSTGRES_USER:-inflect}
    ports:
      - "${DB_PORT:-5435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-inflect}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (caching, jobs, async coordination) ──
  redis:
    image: redis:7-alpine
    container_name: inflect-staging-redis
    restart: unless-stopped
    # Redis MUST require a password in a production-like deployment.
    # The :? syntax aborts `docker compose up` before the container
    # is created if REDIS_PASSWORD is unset — same fail-fast pattern
    # as DATA_ENCRYPTION_KEY below.
    # maxmemory-policy is `noeviction` (NOT allkeys-lru): Redis carries
    # BullMQ job state — an eviction policy would silently drop queued
    # jobs under memory pressure. noeviction makes Redis reject writes
    # (OOM) instead. Matches the ElastiCache parameter group. See
    # docs/deployment.md "Redis — per-environment policy".
    command: redis-server --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD is required — set it in .env.* before starting. Redis must not run unauthenticated in a production-like deployment.}" --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    environment:
      # redis-cli reads REDISCLI_AUTH automatically, so the healthcheck
      # authenticates without putting the password on the command line.
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - staging-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── ClamAV (antivirus scanning) ──
  clamav:
    image: clamav/clamav:1.4
    container_name: inflect-staging-clamav
    restart: unless-stopped
    volumes:
      - staging-clamav-defs:/var/lib/clamav
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Next.js App ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inflect-staging-app
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env.staging
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-inflect}:${POSTGRES_PASSWORD:-staging_password_change_me}@pgbouncer:5432/${POSTGRES_DB:-inflect_staging}?schema=public&pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-inflect}:${POSTGRES_PASSWORD:-staging_password_change_me}@postgres:5432/${POSTGRES_DB:-inflect_staging}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CLAMAV_HOST: clamav:3310
      AV_SCAN_MODE: strict
      STORAGE_PROVIDER: s3
      FILE_STORAGE_ROOT: /data/uploads
      UPLOAD_DIR: /data/uploads
      # GAP-03 — staging runs NODE_ENV=production and is treated as
      # production for encryption-at-rest. Boot will exit(1) if this
      # is unset.
      DATA_ENCRYPTION_KEY: "${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required for staging (NODE_ENV=production). Generate with: openssl rand -base64 48}"
    volumes:
      - staging-uploads:/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/auth/session || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Worker ────────────────────────────────────────────────────
  # BullMQ worker + scheduler — a SEPARATE process from `app` (same
  # image, ENTRYPOINT overridden). Without it NO scheduled job runs
  # and enqueued jobs pile up in Redis. See docker-compose.prod.yml.
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inflect-staging-worker
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: ["node dist/scheduler.mjs && node dist/worker.mjs"]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    env_file:
      - .env.staging
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-inflect}:${POSTGRES_PASSWORD:-staging_password_change_me}@pgbouncer:5432/${POSTGRES_DB:-inflect_staging}?schema=public&pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-inflect}:${POSTGRES_PASSWORD:-staging_password_change_me}@postgres:5432/${POSTGRES_DB:-inflect_staging}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CLAMAV_HOST: clamav:3310
      AV_SCAN_MODE: strict
      STORAGE_PROVIDER: s3
      FILE_STORAGE_ROOT: /data/uploads
      UPLOAD_DIR: /data/uploads
      DATA_ENCRYPTION_KEY: "${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required for staging (NODE_ENV=production). Generate with: openssl rand -base64 48}"
    volumes:
      - staging-uploads:/data/uploads

  # ── pipelock (MCP mediator — AI agent firewall) ───────────────
  # External Apache-2.0 CORE "AI agent firewall for MCP security"
  # (github.com/luckyPipewrench/pipelock). Mediates agent → MCP tool
  # calls and emits mediator-signed Ed25519 action receipts, POSTed to
  # POST /api/t/<slug>/agent-receipts where the app verifies them against
  # PIPELOCK_PUBLIC_KEY. Mode "balanced" = detect + sign (non-blocking);
  # switch to "strict" + app PIPELOCK_STRICT_MODE=1 to block. We use ONLY
  # the Apache-2.0 CORE format — NOT the ELv2 "fleet" features. Pin a
  # digest and provide the PRIVATE signing key before enabling; the app
  # gets only the PUBLIC key. See deploy/docker-compose.prod.yml for the
  # full key-generation runbook.
  pipelock:
    image: ghcr.io/luckypipewrench/pipelock:latest # pin to a digest before enabling
    restart: unless-stopped
    depends_on:
      - app
    environment:
      PIPELOCK_MODE: "balanced"
      PIPELOCK_SIGNING_KEY_FILE: "/run/secrets/pipelock-signing.key"
    volumes:
      - ./pipelock-signing.key:/run/secrets/pipelock-signing.key:ro
    expose:
      - "8080"

volumes:
  staging-pgdata:
    name: inflect-staging-pgdata
  staging-redisdata:
    name: inflect-staging-redisdata
  staging-uploads:
    name: inflect-staging-uploads
  staging-clamav-defs:
    name: inflect-staging-clamav-defs
